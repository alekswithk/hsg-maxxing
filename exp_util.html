
<div style="padding: 1rem 0;">
  <div style="display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;">
    <button onclick="setMode('averse')"  id="btn-averse"  style="font-size:13px;padding:6px 14px;border-radius:20px;border:1.5px solid var(--color-border-primary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;font-weight:500;">Risk-averse (concave)</button>
    <button onclick="setMode('neutral')" id="btn-neutral" style="font-size:13px;padding:6px 14px;border-radius:20px;border:1.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;">Risk-neutral (linear)</button>
    <button onclick="setMode('loving')"  id="btn-loving"  style="font-size:13px;padding:6px 14px;border-radius:20px;border:1.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;">Risk-loving (convex)</button>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;">
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;">Low outcome  x₁</div>
      <input type="range" id="sl-x1" min="0.5" max="7" step="0.1" value="2" style="width:100%" oninput="update()">
      <div style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin-top:2px;">x₁ = <span id="lbl-x1">2.0</span></div>
    </div>
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;">
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;">High outcome  x₂</div>
      <input type="range" id="sl-x2" min="3" max="9.5" step="0.1" value="8" style="width:100%" oninput="update()">
      <div style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin-top:2px;">x₂ = <span id="lbl-x2">8.0</span></div>
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap;">
    <span style="font-size:12px;color:var(--color-text-secondary);">Probability of x₂ &nbsp;(p)</span>
    <input type="range" id="sl-p" min="0.05" max="0.95" step="0.01" value="0.5" style="flex:1;min-width:120px" oninput="update()">
    <span style="font-size:13px;font-weight:500;min-width:38px;color:var(--color-text-primary);">p = <span id="lbl-p">0.50</span></span>
  </div>

  <div style="position:relative;width:100%;height:380px;">
    <canvas id="uc" role="img" aria-label="Utility curve with chord showing Jensen inequality gap">Utility curve with chord.</canvas>
  </div>

  <div id="stats" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;"></div>
  <div id="explainer" style="margin-top:12px;padding:12px 16px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);font-size:13px;color:var(--color-text-secondary);line-height:1.6;"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
const gridCol  = dark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
const axisCol  = dark ? 'rgba(255,255,255,0.3)'  : 'rgba(0,0,0,0.3)';
const textCol  = dark ? '#c2c0b6' : '#3d3d3a';

const modes = {
  averse:  { fn: x => Math.sqrt(x),  label: 'u(x) = √x  (concave)',  color: '#1D9E75' },
  neutral: { fn: x => 0.316*x,       label: 'u(x) = x  (linear)',    color: '#378ADD' },
  loving:  { fn: x => x*x/10,        label: 'u(x) = x²  (convex)',   color: '#D85A30' },
};
let mode = 'averse';

const xs = Array.from({length:201}, (_,i) => i/20);

function makeCurve(fn, color) {
  return {
    label: modes[mode].label,
    data: xs.map(x => ({x, y: fn(x)})),
    borderColor: color, borderWidth: 2.5,
    pointRadius: 0, fill: false, tension: 0,
    order: 3
  };
}

function makeChord(x1, x2, p, fn, chordColor) {
  const y1 = fn(x1), y2 = fn(x2);
  const ex = (1-p)*x1 + p*x2;   // E[x]
  const chord_at_ex = (1-p)*y1 + p*y2;  // point on chord = E[u]
  return [
    // chord line
    { label: 'Chord (expected utility)', data:[{x:x1,y:y1},{x:x2,y:y2}],
      borderColor: chordColor, borderWidth:1.5, borderDash:[6,4],
      pointRadius:[5,5], pointBackgroundColor: chordColor,
      fill:false, tension:0, order:2 },
    // vertical drop from chord to x-axis at E[x]  (E[u])
    { label:'_eu_drop', data:[{x:ex,y:0},{x:ex,y:chord_at_ex}],
      borderColor:'#888', borderWidth:1, borderDash:[3,3],
      pointRadius:0, fill:false, tension:0, order:1 },
    // vertical drop from curve to x-axis at E[x]  (u(E[x]))
    { label:'_uex_drop', data:[{x:ex,y:0},{x:ex,y:fn(ex)}],
      borderColor:'#888', borderWidth:1, borderDash:[3,3],
      pointRadius:0, fill:false, tension:0, order:1 },
    // dot on chord at E[x]
    { label:'E[u(x)] — expected utility (chord)',
      data:[{x:ex, y:chord_at_ex}],
      borderColor: chordColor, backgroundColor: chordColor,
      pointRadius:7, pointStyle:'circle',
      showLine:false, order:0 },
    // dot on curve at E[x]
    { label:'u(E[x]) — utility of expected value (curve)',
      data:[{x:ex, y:fn(ex)}],
      borderColor:'#888', backgroundColor: dark?'#444':'#eee',
      pointRadius:7, pointStyle:'rectRot',
      showLine:false, order:0 },
  ];
}

function makeGap(x1, x2, p, fn) {
  // shaded vertical segment between chord and curve at E[x]
  const ex = (1-p)*x1 + p*x2;
  const eu = (1-p)*fn(x1) + p*fn(x2);
  const uex = fn(ex);
  const lo = Math.min(eu, uex), hi = Math.max(eu, uex);
  const pts = [];
  for(let i=0;i<=40;i++) pts.push({x:ex, y:lo + (hi-lo)*i/40});
  return {
    label:'_gap', data: pts,
    borderColor: mode==='averse'?'rgba(29,158,117,0.6)':mode==='loving'?'rgba(216,90,48,0.6)':'rgba(55,138,221,0.4)',
    borderWidth:8, pointRadius:0, fill:false, tension:0, order:1
  };
}

const baseOpts = {
  responsive:true, maintainAspectRatio:false,
  animation:{duration:300},
  plugins:{
    legend:{
      display:true, position:'bottom',
      labels:{
        color:textCol, font:{size:11}, boxWidth:14, padding:10,
        filter: item => !item.datasetLabel?.startsWith('_')
      }
    },
    tooltip:{
      filter: item => !item.dataset.label?.startsWith('_'),
      callbacks:{label: ctx => `(${ctx.parsed.x.toFixed(2)},  ${ctx.parsed.y.toFixed(3)})`}
    }
  },
  scales:{
    x:{type:'linear',min:0,max:10,
       title:{display:true,text:'Payout  x',color:textCol,font:{size:12}},
       grid:{color:gridCol},ticks:{color:axisCol,font:{size:11}},border:{color:axisCol}},
    y:{min:0,max:3.6,
       title:{display:true,text:'Utility  u(x)',color:textCol,font:{size:12}},
       grid:{color:gridCol},ticks:{color:axisCol,font:{size:11}},border:{color:axisCol}}
  }
};

const chart = new Chart(document.getElementById('uc'), {
  type:'line', data:{datasets:[]}, options:JSON.parse(JSON.stringify(baseOpts))
});

function statCard(label, val, color) {
  return `<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 12px;">
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;">${label}</div>
    <div style="font-size:16px;font-weight:500;color:${color}">${val}</div>
  </div>`;
}

const explains = {
  averse: (rp) => `The chord <b style="color:#1D9E75">lies below the curve</b>. This means E[u(x)] < u(E[x]) — Jensen's inequality for concave functions. The agent gets more utility from the <i>expected value for certain</i> than from the lottery itself. The <b>risk premium</b> is the horizontal gap between CE and E[x]: the agent would give up <b>$${rp}</b> to swap the lottery for its average. Drag the sliders to see how the gap changes with different outcomes or probabilities.`,
  neutral: (_) => `The chord <b style="color:#378ADD">lies exactly on the curve</b> (they are the same line). This means E[u(x)] = u(E[x]) for all lotteries. The agent is perfectly indifferent between the lottery and its expected value — the risk premium is always zero and the CE always equals E[x].`,
  loving:  (rp) => `The chord <b style="color:#D85A30">lies above the curve</b>. This means E[u(x)] > u(E[x]) — Jensen's inequality for convex functions. The agent values the lottery <i>more</i> than a guarantee of the same expected payout. The risk premium is negative (the CE is less than E[x]): the agent would accept <b>$${Math.abs(rp)}</b> less than the expected value just to keep the risk.`,
};

function update() {
  const x1 = parseFloat(document.getElementById('sl-x1').value);
  const x2 = parseFloat(document.getElementById('sl-x2').value);
  const p  = parseFloat(document.getElementById('sl-p').value);
  document.getElementById('lbl-x1').textContent = x1.toFixed(1);
  document.getElementById('lbl-x2').textContent = x2.toFixed(1);
  document.getElementById('lbl-p').textContent  = p.toFixed(2);

  const {fn, color} = modes[mode];
  const ex   = (1-p)*x1 + p*x2;
  const eu   = (1-p)*fn(x1) + p*fn(x2);
  const uex  = fn(ex);
  const ce   = mode==='averse' ? eu*eu : mode==='loving' ? Math.sqrt(eu*10) : eu/0.316;
  const rp   = (ex - ce).toFixed(2);

  chart.data.datasets = [
    makeCurve(fn, color),
    ...makeChord(x1, x2, p, fn, color),
    makeGap(x1, x2, p, fn)
  ];
  chart.update();

  document.getElementById('stats').innerHTML =
    statCard('E[x] — expected payout', '$'+ex.toFixed(2), textCol) +
    statCard('E[u(x)] — exp. utility', eu.toFixed(3), color) +
    statCard('u(E[x]) — utility of E[x]', uex.toFixed(3), dark?'#c2c0b6':'#444') +
    statCard('Risk premium RP', '$'+rp, parseFloat(rp)>0.005?'#1D9E75':parseFloat(rp)<-0.005?'#D85A30':'#378ADD');

  document.getElementById('explainer').innerHTML = explains[mode](rp);
}

function setMode(m) {
  mode = m;
  ['averse','neutral','loving'].forEach(k => {
    const btn = document.getElementById('btn-'+k);
    if(k===m){btn.style.borderColor='var(--color-border-primary)';btn.style.background='var(--color-background-primary)';btn.style.color='var(--color-text-primary)';btn.style.fontWeight='500';}
    else{btn.style.borderColor='var(--color-border-tertiary)';btn.style.background='var(--color-background-secondary)';btn.style.color='var(--color-text-secondary)';btn.style.fontWeight='400';}
  });
  update();
}

update();
</script>
