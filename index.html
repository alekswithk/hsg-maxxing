<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utility Index — Risk Attitudes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #3d3d3a;
      padding: 24px 20px;
      min-height: 100vh;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #c2c0b6; }
      .card { background: #242422 !important; }
      .stat-card { background: #2c2c2a !important; }
      button.inactive { background: #2c2c2a !important; color: #888780 !important; }
    }

    h2 {
      font-size: 17px;
      font-weight: 500;
      margin-bottom: 18px;
      color: inherit;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    button {
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #b4b2a9;
      background: #f1efe8;
      color: #3d3d3a;
      cursor: pointer;
      font-weight: 400;
      transition: all .15s;
    }
    button.active {
      border-color: #3d3d3a;
      background: #ffffff;
      font-weight: 500;
    }
    @media (prefers-color-scheme: dark) {
      button { background: #2c2c2a; color: #888780; border-color: #444441; }
      button.active { background: #1a1a18; color: #c2c0b6; border-color: #c2c0b6; }
    }

    .sliders {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat-card {
      background: #f1efe8;
      border-radius: 8px;
      padding: 10px 14px;
    }
    .stat-card .lbl {
      font-size: 11px;
      color: #888780;
      margin-bottom: 2px;
    }
    .stat-card input[type=range] { width: 100%; margin: 4px 0 2px; }
    .stat-card .val { font-size: 13px; font-weight: 500; }

    .p-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #888780;
    }
    .p-row input[type=range] { flex: 1; }
    .p-row .val { font-size: 13px; font-weight: 500; color: #3d3d3a; min-width: 42px; }
    @media (prefers-color-scheme: dark) { .p-row .val { color: #c2c0b6; } }

    .chart-wrap {
      position: relative;
      width: 100%;
      height: 360px;
      margin-bottom: 12px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .metric {
      background: #f1efe8;
      border-radius: 8px;
      padding: 8px 12px;
    }
    @media (prefers-color-scheme: dark) { .metric { background: #2c2c2a; } }
    .metric .mlbl { font-size: 11px; color: #888780; margin-bottom: 2px; }
    .metric .mval { font-size: 15px; font-weight: 500; }

    .explainer {
      background: #f1efe8;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.65;
      color: #888780;
    }
    @media (prefers-color-scheme: dark) { .explainer { background: #2c2c2a; } }
  </style>
</head>
<body>

  <h2>Utility Index &amp; Risk Attitudes</h2>

  <div class="btn-row">
    <button id="btn-averse"  onclick="setMode('averse')"  class="active">Risk-averse (concave)</button>
    <button id="btn-neutral" onclick="setMode('neutral')" class="inactive">Risk-neutral (linear)</button>
    <button id="btn-loving"  onclick="setMode('loving')"  class="inactive">Risk-loving (convex)</button>
  </div>

  <div class="sliders">
    <div class="stat-card">
      <div class="lbl">Low outcome &nbsp;x₁</div>
      <input type="range" id="sl-x1" min="0.5" max="7" step="0.1" value="2" oninput="update()">
      <div class="val">x₁ = <span id="lbl-x1">2.0</span></div>
    </div>
    <div class="stat-card">
      <div class="lbl">High outcome &nbsp;x₂</div>
      <input type="range" id="sl-x2" min="3" max="9.5" step="0.1" value="8" oninput="update()">
      <div class="val">x₂ = <span id="lbl-x2">8.0</span></div>
    </div>
  </div>

  <div class="p-row">
    <span>Probability of x₂ &nbsp;(p)</span>
    <input type="range" id="sl-p" min="0.05" max="0.95" step="0.01" value="0.5" oninput="update()">
    <span class="val">p = <span id="lbl-p">0.50</span></span>
  </div>

  <div class="chart-wrap">
    <canvas id="uc" role="img" aria-label="Utility index curves with chord showing Jensen inequality gap">Utility curves for three risk attitudes.</canvas>
  </div>

  <div class="stats-grid" id="stats"></div>
  <div class="explainer" id="explainer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script>
    const dark = matchMedia('(prefers-color-scheme: dark)').matches;
    const gridCol = dark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
    const axisCol = dark ? 'rgba(255,255,255,0.3)'  : 'rgba(0,0,0,0.3)';
    const textCol = dark ? '#c2c0b6' : '#3d3d3a';

    const modes = {
      averse:  { fn: x => Math.sqrt(x), label: 'u(x) = √x  (concave, u″ < 0)', color: '#1D9E75' },
      neutral: { fn: x => 0.316 * x,    label: 'u(x) = x  (linear, u″ = 0)',   color: '#378ADD' },
      loving:  { fn: x => x * x / 10,   label: 'u(x) = x²  (convex, u″ > 0)',  color: '#D85A30' },
    };
    let mode = 'averse';

    const xs = Array.from({length: 201}, (_, i) => i / 20);

    function makeCurve(fn, color) {
      return {
        label: modes[mode].label,
        data: xs.map(x => ({x, y: fn(x)})),
        borderColor: color, borderWidth: 2.5,
        pointRadius: 0, fill: false, tension: 0, order: 3
      };
    }

    function makeChord(x1, x2, p, fn, color) {
      const y1 = fn(x1), y2 = fn(x2);
      const ex = (1 - p) * x1 + p * x2;
      const eu = (1 - p) * y1 + p * y2;
      return [
        { label: 'Chord (expected utility)',
          data: [{x: x1, y: y1}, {x: x2, y: y2}],
          borderColor: color, borderWidth: 1.5, borderDash: [6, 4],
          pointRadius: [5, 5], pointBackgroundColor: color,
          fill: false, tension: 0, order: 2 },
        { label: '_eu_drop',
          data: [{x: ex, y: 0}, {x: ex, y: eu}],
          borderColor: '#888', borderWidth: 1, borderDash: [3, 3],
          pointRadius: 0, fill: false, tension: 0, order: 1 },
        { label: '_uex_drop',
          data: [{x: ex, y: 0}, {x: ex, y: fn(ex)}],
          borderColor: '#888', borderWidth: 1, borderDash: [3, 3],
          pointRadius: 0, fill: false, tension: 0, order: 1 },
        { label: 'E[u(x)] — expected utility (chord)',
          data: [{x: ex, y: eu}],
          borderColor: color, backgroundColor: color,
          pointRadius: 7, pointStyle: 'circle',
          showLine: false, order: 0 },
        { label: 'u(E[x]) — utility of expected value (curve)',
          data: [{x: ex, y: fn(ex)}],
          borderColor: '#888', backgroundColor: dark ? '#444' : '#eee',
          pointRadius: 7, pointStyle: 'rectRot',
          showLine: false, order: 0 },
      ];
    }

    function makeGap(x1, x2, p, fn) {
      const ex = (1 - p) * x1 + p * x2;
      const eu = (1 - p) * fn(x1) + p * fn(x2);
      const uex = fn(ex);
      const lo = Math.min(eu, uex), hi = Math.max(eu, uex);
      const pts = Array.from({length: 41}, (_, i) => ({x: ex, y: lo + (hi - lo) * i / 40}));
      const gapColor = mode === 'averse' ? 'rgba(29,158,117,0.6)'
                     : mode === 'loving'  ? 'rgba(216,90,48,0.6)'
                     : 'rgba(55,138,221,0.4)';
      return {
        label: '_gap', data: pts,
        borderColor: gapColor, borderWidth: 8,
        pointRadius: 0, fill: false, tension: 0, order: 1
      };
    }

    const chart = new Chart(document.getElementById('uc'), {
      type: 'line',
      data: {datasets: []},
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: {duration: 300},
        plugins: {
          legend: {
            display: true, position: 'bottom',
            labels: {
              color: textCol, font: {size: 11}, boxWidth: 14, padding: 10,
              filter: item => !item.datasetLabel?.startsWith('_') && !item.text?.startsWith('_')
            }
          },
          tooltip: {
            filter: item => !item.dataset.label?.startsWith('_'),
            callbacks: {label: ctx => `(${ctx.parsed.x.toFixed(2)},  ${ctx.parsed.y.toFixed(3)})`}
          }
        },
        scales: {
          x: { type: 'linear', min: 0, max: 10,
               title: {display: true, text: 'Payout  x', color: textCol, font: {size: 12}},
               grid: {color: gridCol}, ticks: {color: axisCol, font: {size: 11}}, border: {color: axisCol} },
          y: { min: 0, max: 3.6,
               title: {display: true, text: 'Utility  u(x)', color: textCol, font: {size: 12}},
               grid: {color: gridCol}, ticks: {color: axisCol, font: {size: 11}}, border: {color: axisCol} }
        }
      }
    });

    const explains = {
      averse:  rp => `The chord <b style="color:#1D9E75">lies below the curve</b>. This means E[u(x)] &lt; u(E[x]) — Jensen's inequality for concave functions. The agent gets more utility from the <i>expected value for certain</i> than from the lottery itself. The <b>risk premium</b> is the horizontal gap between CE and E[x]: the agent would give up <b>$${rp}</b> to swap the lottery for its average.`,
      neutral: _  => `The chord <b style="color:#378ADD">lies exactly on the curve</b> (they are the same line). E[u(x)] = u(E[x]) for all lotteries. The agent is indifferent between the lottery and its expected value — the risk premium is always zero.`,
      loving:  rp => `The chord <b style="color:#D85A30">lies above the curve</b>. This means E[u(x)] &gt; u(E[x]) — Jensen's inequality for convex functions. The agent values the lottery <i>more</i> than a guarantee of the same expected payout. The risk premium is negative: the agent accepts <b>$${Math.abs(rp)}</b> less than the expected value just to keep the risk.`,
    };

    function update() {
      const x1 = parseFloat(document.getElementById('sl-x1').value);
      const x2 = parseFloat(document.getElementById('sl-x2').value);
      const p  = parseFloat(document.getElementById('sl-p').value);
      document.getElementById('lbl-x1').textContent = x1.toFixed(1);
      document.getElementById('lbl-x2').textContent = x2.toFixed(1);
      document.getElementById('lbl-p').textContent  = p.toFixed(2);

      const {fn, color} = modes[mode];
      const ex  = (1 - p) * x1 + p * x2;
      const eu  = (1 - p) * fn(x1) + p * fn(x2);
      const uex = fn(ex);
      const ce  = mode === 'averse'  ? eu * eu
                : mode === 'loving'  ? Math.sqrt(eu * 10)
                : eu / 0.316;
      const rp  = (ex - ce).toFixed(2);

      chart.data.datasets = [makeCurve(fn, color), ...makeChord(x1, x2, p, fn, color), makeGap(x1, x2, p, fn)];
      chart.update();

      const rpNum = parseFloat(rp);
      const rpColor = rpNum > 0.005 ? '#1D9E75' : rpNum < -0.005 ? '#D85A30' : '#378ADD';

      document.getElementById('stats').innerHTML =
        metric('E[x] — expected payout', '$' + ex.toFixed(2), textCol) +
        metric('E[u(x)] — exp. utility',  eu.toFixed(3),       color)   +
        metric('u(E[x]) — utility of E[x]', uex.toFixed(3),   dark ? '#c2c0b6' : '#444') +
        metric('Risk premium RP',          '$' + rp,           rpColor);

      document.getElementById('explainer').innerHTML = explains[mode](rp);
    }

    function metric(label, val, color) {
      return `<div class="metric"><div class="mlbl">${label}</div><div class="mval" style="color:${color}">${val}</div></div>`;
    }

    function setMode(m) {
      mode = m;
      ['averse', 'neutral', 'loving'].forEach(k => {
        const btn = document.getElementById('btn-' + k);
        btn.className = k === m ? 'active' : 'inactive';
      });
      update();
    }

    update();
  </script>
</body>
</html>
