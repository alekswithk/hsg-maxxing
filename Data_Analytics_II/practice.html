<style>
/* =====================================================================
   THEME TOKENS
   ===================================================================== */
:root{
  --bg:#fbfbfa;              /* soft off-white page */
  --card:#ffffff;
  --ink:#2c2c2c;            /* primary text */
  --ink-soft:#6b6b6b;      /* secondary text */
  --ink-faint:#9a9a9a;
  --line:#ececec;          /* hairlines / borders */
  --accent:#4f46e5;        /* restrained indigo */
  --accent-soft:#eef0ff;   /* accent pill background */
  --accent-ink:#4338ca;
  --good:#15803d;
  --good-bg:#eafaf0;
  --bad:#b91c1c;
  --bad-bg:#fdecec;
  --star:#e0a800;
  --shadow:0 1px 2px rgba(0,0,0,.04), 0 1px 8px rgba(0,0,0,.03);
  --shadow-lift:0 4px 14px rgba(0,0,0,.07);
  --radius:5px;
  --ui:-apple-system,"Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--ui);
  font-size:15px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}

/* ---- offline notice for MathJax ---- */
#mjx-offline{
  display:none;
  background:#fff7ed;border-bottom:1px solid #fed7aa;
  color:#9a3412;font-size:13px;padding:8px 16px;text-align:center;
}

/* =====================================================================
   LAYOUT: sidebar + main
   ===================================================================== */
.app{display:flex;min-height:100vh;align-items:flex-start;}

.sidebar{
  width:248px;flex:0 0 248px;
  position:sticky;top:0;align-self:flex-start;
  height:100vh;overflow-y:auto;
  background:var(--bg);
  border-right:1px solid var(--line);
  padding:22px 14px 28px;
}
.brand{padding:4px 10px 14px;}
.brand h1{font-size:15px;font-weight:650;margin:0;letter-spacing:-.01em;}
.brand p{font-size:11.5px;color:var(--ink-faint);margin:3px 0 0;}

.nav-section{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;
  color:var(--ink-faint);font-weight:600;padding:14px 10px 6px;}

.topic-btn{
  display:flex;align-items:center;gap:8px;width:100%;
  background:none;border:none;cursor:pointer;
  font-family:var(--ui);font-size:13.5px;color:var(--ink-soft);
  text-align:left;padding:7px 10px;border-radius:var(--radius);
  transition:background .12s,color .12s;
  white-space: nowrap; /* Prevent text wrapping */
}
.topic-btn:hover{background:#f1f1ef;color:var(--ink);}
.topic-btn .tnum{font-weight:650;color:var(--ink);min-width:30px;}
.topic-btn .tname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.topic-btn .badge{
  font-size:11px;color:var(--ink-faint);background:#f0f0ee;
  border-radius:20px;padding:1px 8px;font-variant-numeric:tabular-nums;
}
.topic-btn.active{background:var(--accent-soft);color:var(--accent-ink);}
.topic-btn.active .tnum{color:var(--accent-ink);}
.topic-btn.active .badge{background:#dfe2ff;color:var(--accent-ink);}
.topic-btn.empty{opacity:.4;cursor:default;}
.topic-btn.empty:hover{background:none;color:var(--ink-soft);}

.main{flex:1;min-width:0;padding:30px 40px 80px;max-width:920px;}

/* =====================================================================
   HEADER / TOOLBAR
   ===================================================================== */
.head{margin-bottom:18px;}
.head h2{font-size:23px;font-weight:680;margin:0 0 2px;letter-spacing:-.015em;}
.head .sub{color:var(--ink-soft);font-size:13.5px;}

.progwrap{margin:16px 0 6px;}
.progbar{height:5px;background:#ededeb;border-radius:20px;overflow:hidden;}
.progbar > span{display:block;height:100%;width:0;background:var(--accent);
  border-radius:20px;transition:width .3s ease;}
.progmeta{font-size:12px;color:var(--ink-soft);margin-top:6px;}

.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  margin:18px 0 8px;}
.btn{
  font-family:var(--ui);font-size:12.5px;cursor:pointer;
  background:var(--card);border:1px solid var(--line);color:var(--ink-soft);
  padding:6px 12px;border-radius:var(--radius);transition:all .12s;
  display:inline-flex;align-items:center;gap:6px;
}
.btn:hover{border-color:#d7d7d7;color:var(--ink);box-shadow:var(--shadow);}
.btn.on{background:var(--accent-soft);border-color:#d6daff;color:var(--accent-ink);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.primary:hover{background:#4338ca;border-color:#4338ca;color:#fff;}
.btn.ghost{background:none;border-color:transparent;}
.btn.danger:hover{border-color:#f3c4c4;color:var(--bad);}
.toolbar .spacer{flex:1;}

/* =====================================================================
   QUESTION CARD
   ===================================================================== */
.card{
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);
  padding:20px 22px;margin:14px 0;
  transition:box-shadow .15s ease, transform .15s ease;
}
.card:hover{box-shadow:var(--shadow-lift);}
.card.reviewed{border-color:#e3eee7;}

.card-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.tag{
  font-size:10.5px;font-weight:650;text-transform:uppercase;letter-spacing:.05em;
  padding:2px 8px;border-radius:4px;background:#f0f0ee;color:var(--ink-soft);
}
.tag.mc{background:#eef0ff;color:var(--accent-ink);}
.tag.short{background:#eefaf3;color:#0f7a45;}
.tag.derivation{background:#fdf1e7;color:#a85811;}
.tag.long{background:#f3edfb;color:#7e3ec6;}
.pts{font-size:11.5px;color:var(--ink-faint);}
.qid{font-size:11px;color:var(--ink-faint);font-variant-numeric:tabular-nums;}
.card-top .spacer{flex:1;}
.starbtn{background:none;border:none;cursor:pointer;font-size:17px;line-height:1;
  color:#d3d3d3;padding:2px;transition:color .12s,transform .12s;}
.starbtn:hover{transform:scale(1.12);}
.starbtn.on{color:var(--star);}
.reviewed-dot{font-size:11px;color:var(--good);display:none;}
.card.reviewed .reviewed-dot{display:inline;}

.prompt{font-family:var(--serif);font-size:16.5px;line-height:1.6;color:var(--ink);}
.prompt p{margin:.4em 0;}

/* ---- MC options ---- */
.options{list-style:none;margin:14px 0 0;padding:0;display:flex;flex-direction:column;gap:7px;}
.opt{
  display:flex;gap:10px;align-items:flex-start;
  border:1px solid var(--line);border-radius:var(--radius);
  padding:9px 12px;cursor:pointer;background:#fff;
  font-family:var(--serif);font-size:15.5px;line-height:1.5;
  transition:border-color .12s,background .12s;
}
.opt:hover{border-color:#d3d3d3;}
.opt .box{
  flex:0 0 18px;height:18px;margin-top:2px;border:1.5px solid #cfcfcf;border-radius:4px;
  display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;
  transition:all .12s;
}
.opt.sel .box{background:var(--accent);border-color:var(--accent);}
.opt.sel .box::after{content:"✓";}
.opt .lab{flex:1;}
.opt .key{font-weight:650;color:var(--ink-soft);margin-right:2px;}
/* graded states */
.opt.locked{cursor:default;}
.opt.correct-sel{background:var(--good-bg);border-color:#a7e0bf;}
.opt.correct-sel .box{background:var(--good);border-color:var(--good);}
.opt.missed{background:var(--good-bg);border-color:#a7e0bf;}
.opt.missed .box{border-color:var(--good);color:var(--good);background:#fff;}
.opt.missed .box::after{content:"+";color:var(--good);}
.opt.wrong-sel{background:var(--bad-bg);border-color:#eeb4b4;}
.opt.wrong-sel .box{background:var(--bad);border-color:var(--bad);}
.opt.wrong-sel .box::after{content:"✕";}

.mc-feedback{font-size:13px;margin-top:10px;font-weight:600;display:none;}
.mc-feedback.show{display:block;}
.mc-feedback.pass{color:var(--good);}
.mc-feedback.fail{color:var(--bad);}

/* ---- short answer area ---- */
.answer-area{margin-top:14px;}
.answer-area label{font-size:11.5px;color:var(--ink-faint);display:block;margin-bottom:4px;}
.answer-area textarea{
  width:100%;min-height:70px;resize:vertical;
  font-family:var(--serif);font-size:15px;line-height:1.5;color:var(--ink);
  border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px;
  background:#fcfcfc;
}
.answer-area textarea:focus{outline:none;border-color:var(--accent);background:#fff;}

/* ---- action row ---- */
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}

/* ---- solution panel (animated collapse) ---- */
.solution{
  overflow:hidden;max-height:0;opacity:0;
  transition:max-height .2s ease, opacity .18s ease, margin .2s ease;
  margin-top:0;
}
.solution.open{max-height:8000px;opacity:1;margin-top:14px;}
.solution-inner{
  border-left:3px solid var(--accent);
  background:#fafaff;border-radius:0 var(--radius) var(--radius) 0;
  padding:14px 18px;
  font-family:var(--serif);font-size:15.5px;line-height:1.62;color:#33333a;
}
.solution-inner .sol-head{
  font-family:var(--ui);font-size:11px;font-weight:650;text-transform:uppercase;
  letter-spacing:.06em;color:var(--accent-ink);margin-bottom:8px;}
.solution-inner p{margin:.5em 0;}
.solution-inner ul{margin:.5em 0;padding-left:1.2em;}
.solution-inner code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.92em;
  background:#eef0f6;padding:1px 4px;border-radius:3px;}
.solution-inner strong{color:var(--ink);}

.empty-state{text-align:center;color:var(--ink-faint);padding:70px 20px;font-size:14px;}

/* =====================================================================
   MOBILE — sidebar collapses to a top bar
   ===================================================================== */
.menu-toggle{display:none;}
@media (max-width:820px){
  .app{flex-direction:column;}
  .sidebar{
    position:static;height:auto;width:100%;flex:none;
    border-right:none;border-bottom:1px solid var(--line);
    padding:14px;
  }
  .topic-list{display:flex;flex-wrap:wrap;gap:6px;}
  .nav-section{width:100%;padding:6px 4px 2px; display: none;} /* Hide section title on mobile */
  .topic-btn{width:auto;padding:6px 10px;}
  .topic-btn .tname{display:none;}
  .main{padding:20px 16px 60px;max-width:100%;}
  .topic-list.collapsed{display:none;}
  .menu-toggle{display:inline-flex;}
}

/* =====================================================================
   PRINT — hide chrome, lay questions out cleanly, reveal all solutions
   ===================================================================== */
@media print{
  body{background:#fff;font-size:11pt;}
  .sidebar,.toolbar,.progwrap,.starbtn,.actions,.menu-toggle,#mjx-offline,
  .answer-area textarea{display:none !important;}
  .app{display:block;}
  .main{max-width:100%;padding:0;}
  .card{box-shadow:none;border:none;border-bottom:1px solid #ddd;border-radius:0;
    padding:14px 0;break-inside:avoid;page-break-inside:avoid;}
  .card:hover{box-shadow:none;}
  .solution{max-height:none !important;opacity:1 !important;margin-top:10px !important;}
  .solution-inner{background:none;border-left:2px solid #999;}
  .head h2{font-size:18pt;}
  .opt{border-color:#ccc;}
}
</style>
</head>

<div class="app">

<script>
/* ===================================================================== */
/* ===================================================================== */
/*  Q U E S T I O N   B A N K                                            */
/*                                                                       */
/*  This is the editable question bank. Paste new question objects into  */
/*  the QUESTIONS array below (in batches is fine). Each object:         */
/*                                                                       */
/*    {                                                                  */
/*      topic: "T8",        // T1..T12 (see TOPICS list further down)     */
/*      type:  "mc",        // "mc" | "short" | "derivation" | "long"     */
/*      points: 1,          // 1 for short/mc, 10-18 for long             */
/*      prompt: "LaTeX/HTML question string",                            */
/*      options: ["A ...","B ..."],   // mc only                          */
/*      correct: [0,2],              // mc only, 0-based, may be >1        */
/*      solution: "worked solution, LaTeX allowed"                       */
/*    }                                                                   */
/*                                                                       */
/*  Tolerant parser: no options/correct  -> treated as non-MC.           */
/*                    no solution         -> "Work this by hand..." shown.*/
/*                                                                       */
/*  ---- SAMPLE QUESTIONS (4 types) ----                                  */
/*  The first 4 objects below are clearly-marked SAMPLES showing every   */
/*  type. Delete them freely - the real bank follows underneath.         */
/* ===================================================================== */
const QUESTIONS = [

  /* ===================== SAMPLE QUESTIONS (delete me) ===================== */
  /* These four illustrate every type with real DA-II content. Safe to remove. */

  { // SAMPLE — mc
    topic: "T2", type: "mc", points: 1,
    prompt: `**[SAMPLE]** You add an extra regressor to a multiple regression. Which statements about $R^2$ and adjusted $R^2$ ($\\bar R^2$) are correct? Mark all that apply.`,
    options: [
      `$R^2$ can never decrease when a regressor is added.`,
      `$\\bar R^2$ can decrease when a regressor is added.`,
      `$\\bar R^2 = 1-\\dfrac{SSR/(n-k-1)}{TSS/(n-1)}$.`,
      `$\\bar R^2$ is always larger than $R^2$.`,
    ],
    correct: [0, 1, 2],
    solution: `Correct: **(A), (B), (C)**.
- (A) Adding a regressor can only (weakly) increase $R^2$, since SSR cannot rise.
- (B) $\\bar R^2$ penalises extra parameters, so it can fall if the new regressor adds little explanatory power.
- (C) That is the definition of adjusted $R^2$.
- (D) **Wrong**: the penalty makes $\\bar R^2 \\le R^2$ (with equality only trivially), never larger.`,
  },

  { // SAMPLE — short
    topic: "T3", type: "short", points: 1,
    prompt: `**[SAMPLE]** A coefficient estimate is $\\hat\\beta = 0.42$ with standard error $0.15$. State the $t$-statistic for $H_0:\\beta=0$ and whether you reject at the 5% level (two-sided, large sample, critical value $\\approx 1.96$).`,
    solution: `$t = \\dfrac{\\hat\\beta}{\\text{se}} = \\dfrac{0.42}{0.15} = 2.8$. Since $|2.8| > 1.96$, **reject $H_0$** at the 5% level — the coefficient is statistically significant.`,
  },

  { // SAMPLE — derivation
    topic: "T1", type: "derivation", points: 4,
    prompt: `**[SAMPLE]** Derive the OLS slope estimator $\\hat\\beta_1$ for the simple regression $Y_i=\\beta_0+\\beta_1 X_i+u_i$ by minimising the sum of squared residuals. (Do this on paper, then reveal.)`,
    solution: `Minimise $S(\\beta_0,\\beta_1)=\\sum_i (Y_i-\\beta_0-\\beta_1 X_i)^2$.

First-order conditions:
$$\\frac{\\partial S}{\\partial \\beta_0}=-2\\sum_i (Y_i-\\beta_0-\\beta_1 X_i)=0 \\;\\Rightarrow\\; \\hat\\beta_0=\\bar Y-\\hat\\beta_1\\bar X.$$
$$\\frac{\\partial S}{\\partial \\beta_1}=-2\\sum_i X_i(Y_i-\\beta_0-\\beta_1 X_i)=0.$$

Substitute $\\hat\\beta_0=\\bar Y-\\hat\\beta_1\\bar X$ into the second condition:
$$\\sum_i X_i\\big(Y_i-\\bar Y+\\hat\\beta_1\\bar X-\\hat\\beta_1 X_i\\big)=0
\\;\\Rightarrow\\; \\sum_i X_i(Y_i-\\bar Y)=\\hat\\beta_1\\sum_i X_i(X_i-\\bar X).$$

Using $\\sum_i X_i(Y_i-\\bar Y)=\\sum_i (X_i-\\bar X)(Y_i-\\bar Y)$ and likewise for the denominator,
$$\\boxed{\\;\\hat\\beta_1=\\frac{\\sum_i (X_i-\\bar X)(Y_i-\\bar Y)}{\\sum_i (X_i-\\bar X)^2}=\\frac{\\widehat{\\mathrm{Cov}}(X,Y)}{\\widehat{\\mathrm{Var}}(X)}.\\;}$$`,
  },

  { // SAMPLE — long
    topic: "T10", type: "long", points: 14,
    prompt: `**[SAMPLE]** A researcher estimates the return to schooling, $\\log(wage)=\\beta_0+\\beta_1\\,educ+u$, and worries $educ$ is endogenous. She proposes *distance to nearest college* as an instrument.
<br><br>**(a)** State the two conditions an instrument $Z$ must satisfy, and how each is (or isn't) testable.
<br>**(b)** Write out the two-stage least squares (2SLS) procedure for this single-endogenous-regressor case.
<br>**(c)** Explain what a *weak instrument* is and one symptom it produces.
<br>**(d)** Interpret the 2SLS estimate as a LATE — for which subpopulation is it the causal effect?`,
    solution: `**(a) Instrument conditions.**
- *Relevance:* $\\mathrm{Cov}(Z,educ)\\neq 0$. **Testable** — check the first-stage $F$-statistic on $Z$ (rule of thumb $F>10$).
- *Exogeneity / exclusion:* $\\mathrm{Cov}(Z,u)=0$ — $Z$ affects $\\log(wage)$ *only* through $educ$. **Not testable** with one instrument; argued on economic grounds (distance plausibly unrelated to ability/wage shocks, conditional on controls).

**(b) 2SLS.**
1. *First stage:* regress the endogenous regressor on the instrument (and exogenous controls): $educ=\\pi_0+\\pi_1 Z+v$, obtain fitted values $\\widehat{educ}$.
2. *Second stage:* regress the outcome on the fitted values: $\\log(wage)=\\beta_0+\\beta_1\\widehat{educ}+\\text{error}$. The slope is the 2SLS estimate $\\hat\\beta_1^{IV}$.
(Standard errors must come from the 2SLS formula, not the naïve second-stage OLS SEs.)

**(c) Weak instrument.** $Z$ is only weakly correlated with $educ$ (first-stage $\\pi_1\\approx 0$, low $F$). Symptoms: 2SLS becomes **biased toward OLS** and **imprecise** (large SEs); even small violations of exogeneity get amplified, so inference is unreliable.

**(d) LATE.** Under heterogeneous effects and monotonicity, 2SLS identifies the **Local Average Treatment Effect** — the average return to schooling for **compliers**: individuals who get more education *because* they live closer to a college. It is *not* the effect for always-takers or never-takers, so it need not equal the population ATE.`,
  },

  /* ===================== END SAMPLES — real bank follows ===================== */
  {
    topic: "T1",
    type: "mc",
    points: 1,
    prompt: `In the simple regression model $Y_i = \\beta_0 + \\beta_1 X_i + u_i$ estimated by OLS, which of the following are *always* true by construction of the OLS estimator (i.e. hold mechanically for any dataset, regardless of whether the model is "correct")? Mark all that apply.`,
    options: [
      `$\\sum_{i=1}^{n} \\hat{u}_i = 0$ when an intercept is included.`,
      `$\\sum_{i=1}^{n} X_i \\hat{u}_i = 0$.`,
      `The fitted line passes through the point $(\\bar{X}, \\bar{Y})$.`,
      `$\\text{corr}(\\hat{Y}_i, \\hat{u}_i) = 1$.`,
      `$R^2 = \\hat{\\beta}_1^2$.`,
    ],
    correct: [0, 1, 2],
    solution: `Correct: **(A), (B), (C)**.
- (A) True: with an intercept, the FOC for $\\hat\\beta_0$ is exactly $\\sum_i \\hat u_i = 0$.
- (B) True: the FOC for $\\hat\\beta_1$ is $\\sum_i X_i \\hat u_i = 0$.
- (C) True: $\\hat\\beta_0 = \\bar Y - \\hat\\beta_1 \\bar X$ rearranges to $\\bar Y = \\hat\\beta_0 + \\hat\\beta_1 \\bar X$, so $(\\bar X,\\bar Y)$ is on the line.
- (D) **Wrong**: by construction $\\text{corr}(\\hat Y_i,\\hat u_i)=0$ (residuals are orthogonal to fitted values), not 1.
- (E) **Wrong**: $R^2 = \\text{corr}(Y,X)^2$, not $\\hat\\beta_1^2$. It is only equal to $\\hat\\beta_1^2$ in the special case sd$(X)=$sd$(Y)$, which is not general.`,
  },
  {
    topic: "T1",
    type: "short",
    points: 1,
    prompt: `A simple regression of monthly electricity consumption $Y$ (in kWh) on outdoor temperature $X$ (in °C) gives $\\hat{\\beta}_1 = -8.5$. You learn that $\\text{sd}(X) = 6$ °C, $\\text{sd}(Y) = 70$ kWh. Compute the sample correlation $\\text{corr}(X, Y)$ and state the $R^2$ of the regression.`,
    solution: `$\\hat\\beta_1 = \\text{corr}(X,Y)\\cdot \\dfrac{\\text{sd}(Y)}{\\text{sd}(X)}$. So $\\text{corr}(X,Y) = \\hat\\beta_1 \\dfrac{\\text{sd}(X)}{\\text{sd}(Y)} = -8.5 \\cdot \\dfrac{6}{70} = -\\dfrac{51}{70} = -0.7286$.
$R^2 = \\text{corr}^2 = (-0.7286)^2 = 0.531$.
*Check:* $-0.7286 \\times 70/6 = -8.5$ ✓.`,
  },
  {
    topic: "T1",

= σ² · [n(n+1)(2n+1)/6] · [4 / (n²(n+1)²)]

**(a) Unbiasedness.**
E[μ̂_A] = E[X̄ₙ] = (1/n)Σ E[Xᵢ] = μ. ✓
E[μ̂_B] = (1/2)(E[X₁] + E[Xₙ]) = (1/2)(μ + μ) = μ. ✓ Both unbiased.

**(b) Variances.**
Var(μ̂_A) = Var(X̄ₙ) = **σ²/n**.
Var(μ̂_B) = (1/4)(Var(X₁) + Var(Xₙ)) = (1/4)(σ² + σ²) = (1/4)(2σ²) = **σ²/2** (using independence; X₁ and Xₙ uncorrelated).

**(c) Consistency.**
- μ̂_A: Var = σ²/n → 0 and unbiased ⟹ MSE → 0 ⟹ **consistent** (also direct from LLN: X̄ₙ →ᵖ μ). ✓
- μ̂_B: Var = σ²/2 is **constant in n**, does not shrink. Unbiased but variance does not vanish, so it does **not** converge in probability to μ. **Not consistent.** (It always uses only 2 data points regardless of sample size.)

**(d) Case n = 2.**
When n = 2, X̄₂ = (X₁ + X₂)/2 and μ̂_B = (X₁ + X₂)/2 are **identical** — both have variance σ²/2. So at n = 2 the two are equally efficient (in fact the same estimator).

    prompt: `A health economist studies daily steps Xᵢ (i.i.d.) with E[Xᵢ] = μ > 0 and Var(Xᵢ) = σ² < ∞. She is interested in the parameter θ = μ², the squared mean, and proposes the **plug-in estimator** θ̂ₙ = (X̄ₙ)².

**(a) (3 pts)** Is θ̂ₙ unbiased for θ = μ²? Compute E[(X̄ₙ)²] exactly and identify the bias.

**(b) (3 pts)** Show that the bias from part (a) vanishes as n → ∞.

**(c) (4 pts)** Show that θ̂ₙ is **consistent** for θ = μ². State precisely which theorem(s) you use.

**(d) (3 pts)** State the limiting distribution of √n (X̄ₙ − μ) and explain why it provides the building block for an asymptotic distribution of θ̂ₙ.

**(e) (3 pts)** Using the delta method, the asymptotic distribution of √n(θ̂ₙ − μ²) is N(0, V) for some V. Given g(μ) = μ² so g′(μ) = 2μ, write V in terms of μ and σ². Then numerically evaluate V for μ = 8000 steps and σ = 2000.`,
    solution: `### LQ3 — Solution

**(a) Bias of θ̂ₙ = (X̄ₙ)².**
Use Var(X̄ₙ) = E[(X̄ₙ)²] − (E[X̄ₙ])²  ⟹  E[(X̄ₙ)²] = Var(X̄ₙ) + μ² = **σ²/n + μ²**.
Bias = E[θ̂ₙ] − μ² = (σ²/n + μ²) − μ² = **σ²/n > 0**.
So θ̂ₙ is **biased upward** (it overstates μ²), by σ²/n.

**(b) Bias vanishes.**
Bias = σ²/n → 0 as n → ∞. ✓ The estimator is **asymptotically unbiased**.

**(c) Consistency.**
By the LLN, X̄ₙ →ᵖ μ. The map g(x) = x² is continuous, so by the **continuous mapping theorem**, g(X̄ₙ) = (X̄ₙ)² →ᵖ g(μ) = μ². Hence **θ̂ₙ →ᵖ μ² = θ: consistent.** ✓ (Theorems used: Law of Large Numbers + Continuous Mapping Theorem / Slutsky.)

**(d) Limiting distribution / building block.**
By the **CLT**: √n(X̄ₙ − μ) →ᵈ N(0, σ²).
This is the building block because θ̂ₙ = g(X̄ₙ) is a smooth function of X̄ₙ; once we know X̄ₙ is √n-asymptotically normal around μ, a first-order Taylor expansion of g around μ transfers that asymptotic normality to g(X̄ₙ) — this is the delta method.

**(e) Delta method.**
Delta method: √n(g(X̄ₙ) − g(μ)) →ᵈ N(0, [g′(μ)]² σ²).
With g(μ) = μ², g′(μ) = 2μ:
V = [g′(μ)]² σ² = (2μ)² σ² = **4μ²σ²**.
Numerically with μ = 8000, σ = 2000 (σ² = 4,000,000):
V = 4 · (8000)² · (2000)² = 4 · 64,000,000 · 4,000,000
= 4 · 64,000,000 · 4,000,000 = 4 · 2.56 × 10¹⁴ = **1.024 × 10¹⁵**.
So √n(θ̂ₙ − μ²) →ᵈ N(0, 1.024 × 10¹⁵).

which is **constant** — the transformed model is homoskedastic, and OLS on it (= WLS) is BLUE.

**(c)** WLS minimizes the weighted sum of squared residuals
$$\\sum_{i=1}^n w_i\\,(\\text{sav}_i - b_0 - b_1\\,\\text{inc}_i)^2,\\qquad w_i = \\frac{1}{h(\\text{inc}_i)} = \\frac{1}{\\text{inc}_i}.$$

- **Consistent? Yes.** WLS is just a reweighted OLS; with MLR.4 (zero conditional mean) holding, any fixed positive weighting scheme yields consistent (and unbiased) estimates of $\\beta$.
- **BLUE/efficient? No.** GLS is BLUE only with the **correct** weights. Using wrong weights leaves residual heteroskedasticity in the transformed model, so the estimator is inefficient.

(ii) Sensitivity $=\\dfrac{TP}{TP+FN}=\\dfrac{120}{160}=\\mathbf{0.75}$ (75%).

    solution: `### LQ3 .

$$P(\\texttt{admit}_i=1\\mid x_i)=P(e_i>-x_i'\\beta)=1-\\Phi(-x_i'\\beta)=\\Phi(x_i'\\beta),$$
using the symmetry of the standard normal.

**(b)** Index:
$$x'\\hat\\beta=-4.50+0.80(3.5)+0.15(12)+0.30(1)=-4.50+2.80+1.80+0.30=0.40.$$
Predicted probability $\\hat p=\\Phi(0.40)\\approx\\mathbf{0.655}$. *(Between the supplied $\\Phi(0)=0.5$ and $\\Phi(0.5)=0.691$; $\\Phi(0.40)\\approx0.655$.)*

| Took the voucher ($D=1$) | 0.40 | 38 | 47 |
| Did not take ($D=0$) | 0.60 | 30 | 36 |

We observe $Y(1)$ only for the $D=1$ group and $Y(0)$ only for the $D=0$ group (the other cells are counterfactual, shown here only so you can compute the truth).

**(a)** (2 pts) Compute the **ATET** (effect of the voucher among those who took it).

**(b)** (2 pts) Compute the **ATEC** (effect among the non-takers) and the **ATE** for the whole population.

**(c)** (3 pts) State the **prima-facie / naïve contrast** that an analyst would actually compute from observed data, $E[Y\\mid D=1] - E[Y\\mid D=0]$, using only the observable cells. Compute its value.

**(d)** (4 pts) Write the algebraic decomposition of the naïve contrast into **ATET + selection bias**. Compute the selection-bias term numerically and verify your decomposition reproduces the naïve contrast from (c).

**(e)** (3 pts) Interpret the sign of the selection bias economically. Is the naïve contrast an over- or under-estimate of ATET? Of ATE? One sentence each.`,
    solution: `### LQ1 — Solution

Notation: $E[Y(0)\\mid D=1]=38$, $E[Y(1)\\mid D=1]=47$, $E[Y(0)\\mid D=0]=30$, $E[Y(1)\\mid D=0]=36$. Shares: $P(D=1)=0.40$, $P(D=0)=0.60$.

**(a) ATET.**
$$\\text{ATET} = E[Y(1)-Y(0)\\mid D=1] = 47 - 38 = \\boxed{9}.$$

**(b) ATEC and ATE.**
$$\\text{ATEC} = E[Y(1)-Y(0)\\mid D=0] = 36 - 30 = \\boxed{6}.$$
$$\\text{ATE} = 0.40\\cdot \\text{ATET} + 0.60\\cdot \\text{ATEC} = 0.40(9) + 0.60(6) = 3.6 + 3.6 = \\boxed{7.2}.$$

**(c) Naïve / prima-facie contrast.** The analyst sees only the observable cells: $E[Y\\mid D=1] = E[Y(1)\\mid D=1] = 47$ and $E[Y\\mid D=0] = E[Y(0)\\mid D=0] = 30$.
$$E[Y\\mid D=1] - E[Y\\mid D=0] = 47 - 30 = \\boxed{17}.$$

**(d) Decomposition.**
$$\\underbrace{47-30}_{=17} = \\underbrace{(47-38)}_{\\text{ATET}=9} + \\underbrace{(38-30)}_{\\text{selection bias}=8}.$$
Selection bias $= E[Y(0)\\mid D=1] - E[Y(0)\\mid D=0] = 38 - 30 = 8$. Check: $9 + 8 = 17$, matching (c). ✓

**(e) Interpretation.** The selection bias is **positive (+8)**: voucher-takers had a higher *untreated* earnings level (38 vs 30) — they were a "better" group to begin with (more attached to the labour market). The naïve contrast (17) therefore **over-states the ATET** (true 9) and **over-states the ATE** (true 7.2) — roughly doubling the true causal effect.

    prompt: `A bank wants the causal effect of sending a **financial-literacy email** ($D=1$) on the probability a customer starts a savings plan ($Y$). Past internal data show emails were sent mostly to already-engaged customers. The bank now runs an RCT: it randomly assigns $D \\in \\{0,1\\}$ with $P(D=1)=0.5$ and observes:

| Arm | $n$ | Fraction starting a savings plan ($\\bar Y$) |
|-----|:---:|:---:|
| Treated ($D=1$) | 5,000 | 0.34 |
| Control ($D=0$) | 5,000 | 0.22 |

**(a)** (3 pts) Write the independence/ignorability condition that randomisation guarantees, $(Y(0),Y(1)) \\perp D$, and use it to show formally that $E[Y\\mid D=1] - E[Y\\mid D=0] = \\text{ATE}$. In particular, show the selection-bias term vanishes.

**(b)** (2 pts) Compute the estimated ATE from the table. Interpret it in one sentence (percentage-point language).

**(c)** (3 pts) Under randomisation, does the difference in means identify ATE, ATET, **both**, or neither? Explain why ATET = ATE here.

    solution: `### LQ2 — Solution

**(a) Independence and why selection bias vanishes.** Randomisation gives $(Y(0),Y(1)) \\perp D$, hence $E[Y(0)\\mid D=1] = E[Y(0)\\mid D=0] = E[Y(0)]$ and $E[Y(1)\\mid D=1] = E[Y(1)]$. Then
$$E[Y\\mid D=1] - E[Y\\mid D=0] = E[Y(1)\\mid D=1] - E[Y(0)\\mid D=0] = E[Y(1)] - E[Y(0)] = \\text{ATE},$$
and the selection-bias term $E[Y(0)\\mid D=1] - E[Y(0)\\mid D=0] = 0$.

**(b) Estimate.** $\\widehat{\\text{ATE}} = 0.34 - 0.22 = \\boxed{0.12}$. Receiving the email **raises the probability of starting a savings plan by 12 percentage points** on average.

**(c) What is identified.** It identifies **both ATE and ATET** — they coincide here. Under randomisation, the treated subpopulation is a random sample of the whole population (assignment is independent of the unit), so the average effect among the treated equals the population average: $\\text{ATET} = \\text{ATE} = 0.12$.

**(d) Why the historical comparison fails.** Emails were historically sent mostly to *already-engaged* customers, who are more likely to start a savings plan anyway — i.e. $E[Y(0)\\mid D=1] > E[Y(0)\\mid D=0]$ (positive selection bias). The naïve historical contrast would mix the true effect with this baseline difference and over-state the email's causal impact.

**(e) Other threats randomisation doesn't fix.** Any two of: **non-compliance / imperfect take-up**, **attrition / differential drop-out**, **spillovers (SUTVA violations)**, **Hawthorne / experimenter-demand effects**, **external validity / generalisability**, **small-sample chance imbalance**.

    prompt: `A city evaluates a **job-search mentoring** program. Unemployed registrants are **randomly assigned** to be *offered* mentoring ($Z=1$) or not ($Z=0$). Not everyone offered the program actually attends; nobody in the control arm can access mentoring (one-sided non-compliance). Outcome $Y=1$ if re-employed within 6 months. Data:

| Assignment | $n$ | Take-up rate ($D=1$) | Re-employment rate $\\bar Y$ |
|-----|:---:|:---:|:---:|
| Offered ($Z=1$) | 2,000 | 0.60 | 0.50 |
| Not offered ($Z=0$) | 2,000 | 0.00 | 0.38 |

**(a)** (2 pts) Compute the **ITT** effect (effect of being *offered* mentoring).

**(b)** (3 pts) Define **compliers** in this design and give the share of compliers in the offered arm. Explain why, with one-sided non-compliance, the always-takers share is zero.

**(c)** (4 pts) The **LATE** (effect of actually attending, for compliers) is recovered by the Wald / IV ratio $\\dfrac{\\text{ITT on }Y}{\\text{ITT on }D}$. Compute it. State whose effect this is.

**(d)** (3 pts) Compare ITT and LATE in magnitude and explain the relationship. In one sentence each: when is **ITT** the more policy-relevant number, and when is **LATE** more relevant?`,
    solution: `### LQ3 — Solution

**(a) ITT.** $\\text{ITT} = E[Y\\mid Z=1] - E[Y\\mid Z=0] = 0.50 - 0.38 = \\boxed{0.12}$ (12 pp higher re-employment from being *offered* mentoring).

**(b) Compliers.** Compliers = those who attend when offered ($Z=1\\Rightarrow D=1$) but would not attend otherwise ($Z=0\\Rightarrow D=0$). In the offered arm, take-up is 0.60 and the control take-up is 0.00, so the **complier share = $0.60 - 0.00 = 0.60$**. With one-sided non-compliance, **nobody in the control arm can access treatment**, so the **always-takers share is 0** (and the remaining 0.40 of the offered arm who don't attend are never-takers; no defiers under monotonicity).

**(c) LATE (Wald estimator).**
$$\\text{LATE} = \\frac{\\text{ITT}_Y}{\\text{ITT}_D} = \\frac{E[Y\\mid Z=1]-E[Y\\mid Z=0]}{E[D\\mid Z=1]-E[D\\mid Z=0]} = \\frac{0.50 - 0.38}{0.60 - 0.00} = \\frac{0.12}{0.60} = \\boxed{0.20}.$$
This is the effect of **actually attending** mentoring for the **compliers** — a 20 pp increase in re-employment. (With one-sided non-compliance, LATE = effect of Treatment on the Treated.)

**(d) ITT vs LATE.** $\\text{ITT}=0.12 < \\text{LATE}=0.20$. ITT is *diluted* because it averages the complier effect over the whole offered arm, 40% of whom never attend (so contribute ~no effect): $\\text{ITT} = (\\text{complier share})\\times\\text{LATE} = 0.60 \\times 0.20 = 0.12$. ✓ **ITT** is the more relevant number when deciding whether to *roll out the offer/program* as a policy (you can only offer, not compel). **LATE** is more relevant when you want the biological/behavioural effect of *actually receiving* the treatment among those it reaches.`,

$$

$$
\\text{Fitness}_i = \\delta_0 + \\delta_1 z_i + r_i,

**(a)** Substitute $\\text{Fitness}_i = \\delta_0 + \\delta_1 z_i + r_i$ into the true model:
$$
\\text{HR}_i = \\beta_0 + \\beta_1\\text{Exercise}_i + \\beta_2(\\delta_0 + \\delta_1 z_i + r_i) + u_i
= \\underbrace{(\\beta_0 + \\beta_2\\delta_0)}_{\\gamma_0} + \\underbrace{\\beta_1}_{\\gamma_1}\\text{Exercise}_i + \\underbrace{\\beta_2\\delta_1}_{\\gamma_2} z_i + \\underbrace{(u_i + \\beta_2 r_i)}_{e_i}.
$$
So
$$
\\boxed{\\gamma_0 = \\beta_0 + \\beta_2\\delta_0,\\quad \\gamma_1 = \\beta_1,\\quad \\gamma_2 = \\beta_2\\delta_1,\\quad e_i = u_i + \\beta_2 r_i.}
$$
The working model is correctly specified provided $e_i$ is mean-independent of the regressors (shown next).

**(b)** Compute the conditional expectation of the working error:
$$
\\mathbb{E}[e_i \\mid \\text{Exercise}_i, z_i] = \\mathbb{E}[u_i \\mid \\text{Exercise}_i, z_i] + \\beta_2\\,\\mathbb{E}[r_i \\mid \\text{Exercise}_i, z_i].
$$
- First term: by the structural assumption $\\mathbb{E}[u_i\\mid \\text{Exercise}_i, \\text{Fitness}_i]=0$, combined with $\\operatorname{Cov}(u_i, z_i)=0$ (proxy exogeneity), the first term is $0$.
- Second term: $\\operatorname{Cov}(z_i, r_i) = 0$ by construction of the projection, and $\\operatorname{Cov}(\\text{Exercise}_i, r_i)=0$ by the **redundancy condition**; with $\\mathbb{E}[r_i]=0$ this gives $\\mathbb{E}[r_i\\mid \\text{Exercise}_i, z_i]=0$.

Therefore
$$
\\boxed{\\mathbb{E}[e_i \\mid \\text{Exercise}_i, z_i] = 0.}
$$
*(Assignment of assumptions: proxy exogeneity kills the $u$ term against $z$; the structural zero-conditional-mean kills the $u$ term against Exercise; the projection orthogonality kills $r$ against $z$; redundancy kills $r$ against Exercise.)*

**(c)** Since $e_i$ has zero conditional mean given $(\\text{Exercise}_i, z_i)$, OLS on the working model is consistent: $\\hat\\gamma_1 \\xrightarrow{p}\\gamma_1 = \\beta_1$. So **the plug-in regression consistently estimates $\\beta_1$ exactly** — the proxy *fully eliminates* the bias on the coefficient of the observed regressor. This works **only because the redundancy condition holds**: the uncaptured part of fitness, $r_i$, is uncorrelated with Exercise, so it does not contaminate $\\hat\\gamma_1$. (Note: the coefficient on $z$ recovers $\\beta_2\\delta_1$, *not* $\\beta_2$ itself — fitness's own effect is only identified up to the scaling $\\delta_1$.)

**(d)** If redundancy fails, $\\operatorname{Cov}(\\text{Exercise}_i, r_i)=\\sigma_{xr}\\neq 0$. Now $e_i = u_i + \\beta_2 r_i$ is correlated with Exercise through $r_i$. Using the partialling-out (FWL) logic, let $\\widetilde{\\text{Exercise}}_i$ be Exercise after removing its linear projection on $z_i$ and the constant. Then
$$
\\hat\\gamma_1 \\xrightarrow{p} \\beta_1 + \\beta_2\\cdot\\frac{\\operatorname{Cov}(\\widetilde{\\text{Exercise}}_i, r_i)}{\\operatorname{Var}(\\widetilde{\\text{Exercise}}_i)}.
$$
Because $\\operatorname{Cov}(z_i, r_i)=0$, partialling $z$ out of Exercise does not remove the $r$-covariance, so $\\operatorname{Cov}(\\widetilde{\\text{Exercise}}_i, r_i)=\\sigma_{xr}$, and
$$
\\boxed{\\hat\\gamma_1 \\xrightarrow{p} \\beta_1 + \\beta_2\\cdot\\frac{\\sigma_{xr}}{\\operatorname{Var}(\\text{Exercise}_i\\mid z_i)}.}
$$
**Sign:** $\\beta_2 < 0$ and $\\sigma_{xr} > 0$ ⇒ the residual bias term is **negative**, so $\\hat\\gamma_1$ is biased **downward** (the estimated effect of Exercise on resting heart rate is too negative).

**(d) (2 pts)** Compare (b) and (c): by what fraction does the proxy reduce the omitted-variable bias? Comment on whether the proxy *eliminates* or merely *shrinks* the bias, and what would have to be true of $r$ for elimination.`,
    solution: `### LQ2 — Solution

**(a)** Internal consistency check:
$$
\\delta_1\\operatorname{Cov}(\\text{educ},z) + \\operatorname{Cov}(\\text{educ},r) = 0.50\\times 2.40 + 0.30 = 1.20 + 0.30 = 1.50 = \\operatorname{Cov}(\\text{educ},\\text{ability}).\\ \\checkmark
$$
The moments are mutually consistent.

**(b)** Omitting ability entirely, simple OVB formula:
$$
\\text{plim}\\,\\hat\\beta_1 = \\beta_1 + \\beta_2\\frac{\\operatorname{Cov}(\\text{educ},\\text{ability})}{\\operatorname{Var}(\\text{educ})}
= 0.060 + 0.080\\times\\frac{1.50}{4.00} = 0.060 + 0.080\\times 0.375 = 0.060 + 0.030 = \\boxed{0.090}.
$$
Omitted-variable bias $= +0.030$ (upward; the return to education is overstated by 50%).

**(c)** With the proxy included, only $r$ (the part of ability not captured by $z$) contaminates educ:
$$
\\text{bias}_{\\text{proxy}} = \\beta_2\\frac{\\operatorname{Cov}(\\text{educ},r)}{\\operatorname{Var}(\\text{educ})} = 0.080\\times\\frac{0.30}{4.00} = 0.080\\times 0.075 = 0.006.
$$
$$
\\text{plim}\\,\\hat\\beta_1^{\\text{proxy}} = 0.060 + 0.006 = \\boxed{0.066}.
$$
Remaining bias $= +0.006$.

**(d)** The proxy cuts the bias from $0.030$ to $0.006$, i.e. it removes
$$
1 - \\frac{0.006}{0.030} = 1 - 0.20 = 0.80 = \\mathbf{80\\%}
$$
of the omitted-variable bias. The proxy **shrinks but does not eliminate** the bias. Elimination would require $\\operatorname{Cov}(\\text{educ}, r) = 0$ — i.e. the part of ability not explained by the test score must be uncorrelated with education (the redundancy condition). Here $\\operatorname{Cov}(\\text{educ},r)=0.30\\neq 0$, so a small residual bias persists.

with $\\text{Motivation}_i$ unobserved, $\\beta_2 > 0$, and $\\operatorname{Cov}(\\text{StudyHours}_i, \\text{Motivation}_i) > 0$.

The researcher proposes two candidate proxies for motivation:

- **Proxy A:** number of optional practice quizzes attempted *before* the exam, $z^A_i$. It satisfies $\\operatorname{Cov}(u_i, z^A_i) = 0$ and is redundant given motivation.
- **Proxy B:** the student's *mid-term* exam score, $z^B_i$. Mid-term score is itself partly *caused by* study hours and by the same shock components that move the final score, so $\\operatorname{Cov}(u_i, z^B_i) \\neq 0$.

**(a) (3 pts)** Explain why Proxy A is a valid proxy but Proxy B is not, in terms of the proxy assumptions (redundancy and exogeneity w.r.t. $u$). Identify which assumption Proxy B violates.

**(b) (4 pts)** Suppose with Proxy B the working-model error is $e_i = u_i + \\beta_2 r^B_i$, where $\\operatorname{Cov}(z^B_i, u_i) = \\sigma_{zu} > 0$. Derive $\\mathbb{E}[e_i \\mid \\text{StudyHours}_i, z^B_i]$ and explain why it is **not** zero, and what kind of bias this induces on the coefficient of $z^B_i$ (and potentially on $\\beta_1$).

**(c) (3 pts)** State a practical rule for choosing a proxy that distinguishes A from B, and give one additional real-world example of a *tempting but invalid* proxy (an "outcome-like" proxy) in a different economic setting.`,
    solution: `### LQ3 — Solution

**(a)** A valid proxy must satisfy (i) **exogeneity**: $\\operatorname{Cov}(u, z)=0$, and (ii) **redundancy**: $z$ affects the outcome only through the unobserved variable it proxies (its residual is uncorrelated with the included regressors and it has no direct effect on $y$).
- **Proxy A** (practice quizzes) is plausibly driven by motivation and has no direct causal effect on the final score beyond reflecting motivation; $\\operatorname{Cov}(u, z^A)=0$. Valid.
- **Proxy B** (mid-term score) is an **outcome-like** variable: it is caused by study hours and shares the same shocks ($u$) that move the final score. Hence $\\operatorname{Cov}(u, z^B)\\neq 0$ — it **violates the exogeneity assumption** $\\operatorname{Cov}(u,z)=0$. (It is essentially a "bad control" / outcome proxy.)

**(b)** With $e_i = u_i + \\beta_2 r^B_i$ and $\\operatorname{Cov}(z^B_i, u_i)=\\sigma_{zu}>0$:
$$
\\mathbb{E}[e_i\\mid \\text{StudyHours}_i, z^B_i] = \\mathbb{E}[u_i\\mid \\text{StudyHours}_i, z^B_i] + \\beta_2\\,\\mathbb{E}[r^B_i\\mid\\cdots].
$$
The first term is **not zero**: because $z^B_i$ is correlated with $u_i$ ($\\sigma_{zu}>0$), conditioning on $z^B_i$ carries information about $u_i$, so $\\mathbb{E}[u_i\\mid z^B_i]\\neq 0$. Thus
$$
\\mathbb{E}[e_i\\mid \\text{StudyHours}_i, z^B_i]\\neq 0.
$$
This makes the proxy **endogenous**: OLS on the working model is inconsistent. The coefficient on $z^B$ is contaminated by $\\sigma_{zu}$ (the proxy partly "predicts" the error, inflating its coefficient), and because study hours and the mid-term are correlated, this endogeneity **spills over and biases $\\hat\\beta_1$** as well — including this proxy can be worse than leaving motivation out.

**(c)** **Practical rule:** choose a proxy that is a *predetermined / causally-upstream* indicator of the unobserved variable and that has **no direct channel to the outcome** and is **not itself an outcome** of the regressors or of the same shocks. Concretely: the proxy should be plausibly *exogenous to $u$* — avoid anything measured "downstream" of $y$.
**Additional invalid example:** in a wage regression with unobserved ability, using the *current job's performance rating* as a proxy for ability is tempting but invalid — the rating is itself an outcome influenced by the same unobserved shocks and by the wage-setting process, so $\\operatorname{Cov}(u, z)\\neq 0$. A valid alternative would be a pre-labour-market aptitude test score.`,

| 2017→2018  | +1.0     | +1.5     |
| 2018→2019  | +1.0     | +1.5     |

Both regions rose **steadily**, but Region B grew by +1.5/year while Region A grew by +1.0/year — the trends are *roughly* parallel in shape (both linear, stable) but **not identical in slope** (B trends ~0.5 faster per year). So parallel trends is *approximately* plausible (consistent growth, no crossing or divergence in direction) but **imperfect**: Region B was on a slightly steeper path even before the closure, which by itself (extrapolated over two years) would push the DiD downward by roughly $2\\times0.5 = 1.0$ thousand, suggesting the true closure effect is a bit smaller in magnitude than −9.5.

**(c)** Parallel trends here means: **had the plant not closed, Region A's mean income would have continued to evolve parallel to Region B's actual path** — i.e., from its 2019 level of 62.0 it would have changed by the same amount Region B did (+4.5), reaching $62.0 + 4.5 = 66.5$ in 2021. The estimated effect is the gap between Region A's actual 57.0 and this counterfactual 66.5, i.e. −9.5. Pre-trends can never *prove* this because parallel trends is a statement about the **unobservable counterfactual** in the *post*-period; matching pre-trends only makes it more credible, but the two paths could still have diverged after 2019 for reasons unrelated to the closure.

**(d)** If the plant closed *because* Region A was already secretly weakening (declining orders not yet reflected in 2017–2019 income), then treatment status is **correlated with a negative latent trend** in Region A — classic **selection into treatment / selection on (future) trends**. Region A's counterfactual income would then have *fallen below* Region B's path even absent the closure, so attributing the full gap to the closure **overstates** the negative effect: the DiD is biased **downward (too negative)**. Part of the −9.5 reflects the pre-existing decline, not the closure itself.

**(e)** Two-way fixed-effects specification using all five years:
$$Y_{it} = \\alpha_i + \\gamma_t + \\delta\\,(\\text{TreatedRegion}_i \\times \\text{Post}_t) + u_{it},$$
where $\\alpha_i$ are region fixed effects (Region A, Region B), $\\gamma_t$ are year fixed effects (2017–2021), $\\text{Post}_t = 1$ for $t\\ge 2020$, and the treatment indicator equals 1 for Region A in 2020–2021. The **ATET is captured by $\\delta$**. Advantages of the multi-period FE specification over the bare 2×2: it uses *all* the data (more precision), allows **flexible common year effects** $\\gamma_t$ rather than a single pre/post shock, and—if extended to an event-study with leads—lets the researcher **test pre-trends** and trace the dynamic path of the effect rather than collapsing everything to one number.`,
  },
];
/* ===================================================================== */
/*  END OF QUESTION BANK - UI code below; you normally won't edit it.    */
/* ===================================================================== */

/* ===================================================================== */
/*  TOPIC LABELS (sidebar)                                                */
/* ===================================================================== */
const TOPICS = [
  ["T1",  "Simple Linear Regression"],
  ["T2",  "Multiple Linear Regression"],
  ["T3",  "Hypothesis Testing"],
  ["T4",  "Asymptotics & Estimator Properties"],
  ["T5",  "Heteroskedasticity"],
  ["T6",  "Model Specification"],
  ["T7",  "Effect Heterogeneity / Interactions"],
  ["T8",  "Binary Dependent Variables"],
  ["T9",  "Causal Inference & Potential Outcomes"],
  ["T10", "Endogeneity: IV & 2SLS"],
  ["T11", "Proxy Variables"],
  ["T12", "Difference-in-Differences"],
];

const TYPE_LABEL = { mc:"MC", short:"Short", derivation:"Derivation", long:"Long" };

/* ===================================================================== */
/*  STATE  (in-memory only — a reload starts fresh, by design)            */
/* ===================================================================== */
// Give every question a stable id and normalise fields tolerantly.
QUESTIONS.forEach((q, i) => {
  q._id = i;
  // tolerant typing: if options+correct present but type not "mc", still
  // honour it as MC; if type is "mc" but options missing, demote to "short".
  const hasMC = Array.isArray(q.options) && q.options.length > 0 &&
                Array.isArray(q.correct);
  if (hasMC && q.type !== "mc") q.type = "mc";
  if (!hasMC && q.type === "mc") q.type = "short";
  if (!q.type) q.type = hasMC ? "mc" : "short";
});

const state = {
  topic: "ALL",            // "ALL" or "T1".."T12"
  shuffle: false,
  starFilter: false,
  hideReviewed: false,
  reviewed: new Set(),     // ids whose solution was revealed / MC checked
  starred: new Set(),      // ids
  order: {},               // cached shuffle order per view key
};

/* ===================================================================== */
/*  SMALL HELPERS                                                         */
/* ===================================================================== */
function countByTopic(t){ return QUESTIONS.filter(q => q.topic === t).length; }

function typesetMath(el){
  // Render only the just-added subtree, once MathJax is ready.
  if (window.MathJax && MathJax.typesetPromise && window.__mathjaxReady){
    MathJax.typesetPromise([el]).catch(()=>{});
  } else if (window.MathJax && MathJax.typesetPromise){
    // queue until ready
    const tryLater = () => {
      if (window.__mathjaxReady) MathJax.typesetPromise([el]).catch(()=>{});
      else setTimeout(tryLater, 120);
    };
    tryLater();
  }
}

// Fisher–Yates, returns a new shuffled array of indices.
function shuffled(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Very small Markdown-ish renderer for solution text: **bold**, `code`,
// "- " bullet lists, and blank-line paragraphs. LaTeX is left untouched
// for MathJax. (Solutions are author-controlled, so this is safe enough.)
function renderRich(src){
  if (src == null) return "";
  // protect math spans so markdown doesn't touch them
  const math = [];
  let s = String(src).replace(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$|\\\[[\s\S]*?\\\]|\\\([\s\S]*?\\\))/g,
    m => { math.push(m); return "␀" + (math.length - 1) + "␀"; });

  // escape HTML
  s = s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // inline code, bold, italics
  s = s.replace(/`([^`]+)`/g, (_,c)=>"<code>"+c+"</code>");
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");

  // build block structure
  const lines = s.split(/\n/);
  let html = "", inList = false;
  const flush = () => { if (inList){ html += "</ul>"; inList = false; } };
  let para = [];
  const flushPara = () => {
    if (para.length){ html += "<p>" + para.join("<br>") + "</p>"; para = []; }
  };
  for (let raw of lines){
    const line = raw.replace(/\s+$/,"");
    if (/^\s*[-*]\s+/.test(line)){
      flushPara();
      if (!inList){ html += "<ul>"; inList = true; }
      html += "<li>" + line.replace(/^\s*[-*]\s+/, "") + "</li>";
    } else if (line.trim() === ""){
      flush(); flushPara();
    } else {
      if (inList) flush();
      para.push(line);
    }
  }
  flush(); flushPara();

  // restore math
  html = html.replace(/␀(\d+)␀/g, (_,i)=>math[+i]);
  return html;
}

/* ===================================================================== */
/*  SIDEBAR                                                               */
/* ===================================================================== */
function buildSidebar(){
  const nav = document.getElementById("topicList");
  let html = "";
  // "All" pseudo-topic
  html += topicButtonHTML("ALL", "All topics", QUESTIONS.length);
  for (const [t, name] of TOPICS){
    html += topicButtonHTML(t, name, countByTopic(t));
  }
  nav.innerHTML = html;
}
function topicButtonHTML(id, name, n){
  const empty = n === 0 ? " empty" : "";
  const numLabel = id === "ALL" ? "★" : id;
  return `<button class="topic-btn${empty}" data-topic="${id}"
            ${n===0 ? "" : `onclick="selectTopic('${id}')"`}>
            <span class="tnum">${numLabel}</span>
            <span class="tname">${name}</span>
            <span class="badge">${n}</span>
          </button>`;
}
function highlightSidebar(){
  document.querySelectorAll(".topic-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.topic === state.topic);
  });
}

/* ===================================================================== */
/*  VIEW SELECTION / RENDER                                               */
/* ===================================================================== */
function selectTopic(t){
  state.topic = t;
  highlightSidebar();
  render();
  window.scrollTo({ top:0, behavior:"smooth" });
}

// Questions in the current view, honouring shuffle + filters.
function currentList(){
  let list = QUESTIONS.filter(q =>
    state.topic === "ALL" ? true : q.topic === state.topic);

  if (state.starFilter)   list = list.filter(q => state.starred.has(q._id));
  if (state.hideReviewed) list = list.filter(q => !state.reviewed.has(q._id));

  if (state.shuffle){
    const key = state.topic;
    if (!state.order[key]) state.order[key] = shuffled(QUESTIONS.map(q=>q._id));
    const pos = id => state.order[key].indexOf(id);
    list = list.slice().sort((a,b)=>pos(a._id) - pos(b._id));
  }
  return list;
}

function render(){
  const list = currentList();
  const cards = document.getElementById("cards");

  // header
  const title = state.topic === "ALL"
    ? "All topics"
    : `${state.topic} · ${TOPICS.find(t=>t[0]===state.topic)[1]}`;
  document.getElementById("viewTitle").textContent = title;

  if (list.length === 0){
    let msg = "No questions in this view.";
    if (state.starFilter)   msg = "No starred questions in this view yet. Star a few with the ☆ button.";
    else if (state.hideReviewed) msg = "Everything here is reviewed. Nice. Turn off “Hide reviewed” to see them again.";
    else if (countByTopic(state.topic) === 0 && state.topic!=="ALL")
      msg = "This topic has no questions yet — add some to the QUESTIONS array.";
    cards.innerHTML = `<div class="empty-state">${msg}</div>`;
    document.getElementById("viewSub").textContent = "";
    updateProgress(list);
    return;
  }

  cards.innerHTML = list.map(cardHTML).join("");
  document.getElementById("viewSub").textContent =
    `${list.length} question${list.length===1?"":"s"}`;

  // wire up + typeset each card
  list.forEach(q => {
    const root = document.getElementById("q-"+q._id);
    typesetMath(root);
  });
  updateProgress(list);
}

/* ===================================================================== */
/*  CARD MARKUP                                                           */
/* ===================================================================== */
function cardHTML(q){
  const reviewed = state.reviewed.has(q._id) ? " reviewed" : "";
  const starOn = state.starred.has(q._id) ? " on" : "";
  const tag = TYPE_LABEL[q.type] || "Short";

  let body = "";
  if (q.type === "mc")          body = mcBody(q);
  else if (q.type === "short")  body = shortBody(q);
  else if (q.type === "derivation") body = derivationBody(q);
  else if (q.type === "long")   body = longBody(q);
  else                          body = shortBody(q);

  return `
  <div class="card${reviewed}" id="q-${q._id}">
    <div class="card-top">
      <span class="tag ${q.type}">${tag}</span>
      <span class="pts">${q.points!=null ? q.points + (q.points===1?" pt":" pts") : ""}</span>
      <span class="reviewed-dot">● reviewed</span>
      <span class="spacer"></span>
      <span class="qid">${q.topic} · #${q._id}</span>
      <button class="starbtn${starOn}" title="Mark for review"
              onclick="toggleStar(${q._id})">${state.starred.has(q._id)?"★":"☆"}</button>
    </div>
    <div class="prompt">${renderRich(q.prompt)}</div>
    ${body}
  </div>`;
}

function solutionPanel(q){
  const sol = (q.solution!=null && String(q.solution).trim()!=="")
    ? renderRich(q.solution)
    : `<em>Work this by hand — no model solution provided.</em>`;
  return `<div class="solution" id="sol-${q._id}">
            <div class="solution-inner">
              <div class="sol-head">Solution</div>
              ${sol}
            </div>
          </div>`;
}

/* ---- MC ---- */
function mcBody(q){
  const opts = q.options.map((o,i)=>`
    <li class="opt" data-i="${i}" onclick="toggleOpt(${q._id},${i})">
      <span class="box"></span>
      <span class="lab"><span class="key">${String.fromCharCode(65+i)}.</span> ${renderRich(o)}</span>
    </li>`).join("");
  return `
    <ul class="options" id="opts-${q._id}">${opts}</ul>
    <div class="mc-feedback" id="fb-${q._id}"></div>
    <div class="actions">
      <button class="btn primary" id="check-${q._id}" onclick="checkMC(${q._id})">Check answer</button>
      <button class="btn" onclick="toggleSolution(${q._id})">Show solution</button>
    </div>
    ${solutionPanel(q)}`;
}

/* ---- SHORT ---- */
function shortBody(q){
  return `
    <div class="answer-area">
      <label>Your answer (not graded — just for thinking)</label>
      <textarea placeholder="Jot your reasoning…"></textarea>
    </div>
    <div class="actions">
      <button class="btn" onclick="toggleSolution(${q._id})">Show solution</button>
    </div>
    ${solutionPanel(q)}`;
}

/* ---- DERIVATION (deliberate single reveal, no answer field) ---- */
function derivationBody(q){
  return `
    <div class="actions">
      <button class="btn primary" id="reveal-${q._id}" onclick="toggleSolution(${q._id})">
        Reveal solution
      </button>
    </div>
    ${solutionPanel(q)}`;
}

/* ---- LONG (multi-part; reveal full solution) ---- */
function longBody(q){
  return `
    <div class="answer-area">
      <label>Scratch space (optional)</label>
      <textarea placeholder="Outline parts (a), (b), (c)…"></textarea>
    </div>
    <div class="actions">
      <button class="btn primary" id="reveal-${q._id}" onclick="toggleSolution(${q._id})">
        Reveal full solution
      </button>
    </div>
    ${solutionPanel(q)}`;
}

/* ===================================================================== */
/*  INTERACTIONS                                                          */
/* ===================================================================== */
function toggleOpt(id, i){
  const opts = document.getElementById("opts-"+id);
  if (!opts || opts.classList.contains("graded")) return;   // locked after check
  const li = opts.querySelector(`.opt[data-i="${i}"]`);
  li.classList.toggle("sel");
}

function checkMC(id){
  const q = QUESTIONS[id];
  const opts = document.getElementById("opts-"+id);
  if (opts.classList.contains("graded")) return;
  opts.classList.add("graded");

  const correct = new Set(q.correct);
  let allRight = true;
  opts.querySelectorAll(".opt").forEach(li=>{
    const i = +li.dataset.i;
    const sel = li.classList.contains("sel");
    li.classList.add("locked");
    li.classList.remove("sel");
    if (correct.has(i) && sel)       li.classList.add("correct-sel");
    else if (correct.has(i) && !sel){ li.classList.add("missed");    allRight = false; }
    else if (!correct.has(i) && sel){ li.classList.add("wrong-sel"); allRight = false; }
  });

  const fb = document.getElementById("fb-"+id);
  fb.className = "mc-feedback show " + (allRight ? "pass" : "fail");
  fb.textContent = allRight
    ? "✓ Correct — every right option selected, no wrong ones."
    : "✕ Not quite. Green = correct (＋ = you missed it), red = wrongly selected.";

  document.getElementById("check-"+id).textContent = "Checked";
  document.getElementById("check-"+id).disabled = true;

  markReviewed(id);
}

function toggleSolution(id){
  const panel = document.getElementById("sol-"+id);
  const open = panel.classList.toggle("open");
  if (open){
    typesetMath(panel);
    markReviewed(id);
    // for derivation/long, relabel the reveal button
    const rb = document.getElementById("reveal-"+id);
    if (rb) rb.textContent = "Hide solution";
  } else {
    const rb = document.getElementById("reveal-"+id);
    if (rb) rb.textContent =
      QUESTIONS[id].type === "long" ? "Reveal full solution" : "Reveal solution";
  }
}

function toggleStar(id){
  if (state.starred.has(id)) state.starred.delete(id);
  else state.starred.add(id);
  // re-render only if a star filter could change the visible set
  if (state.starFilter) render();
  else {
    const btn = document.querySelector(`#q-${id} .starbtn`);
    const on = state.starred.has(id);
    btn.classList.toggle("on", on);
    btn.textContent = on ? "★" : "☆";
  }
}

function markReviewed(id){
  if (!state.reviewed.has(id)){
    state.reviewed.add(id);
    const card = document.getElementById("q-"+id);
    if (card) card.classList.add("reviewed");
  }
  updateProgress(currentList());
}

/* ===================================================================== */
/*  PROGRESS  ("Reviewed X / Y in <view>")                               */
/* ===================================================================== */
function updateProgress(){
  // base the denominator on the topic (ignoring star/hide filters so the
  // number is stable), numerator = reviewed within that topic.
  const inTopic = QUESTIONS.filter(q =>
    state.topic === "ALL" ? true : q.topic === state.topic);
  const total = inTopic.length;
  const done  = inTopic.filter(q => state.reviewed.has(q._id)).length;
  const pct = total ? Math.round(100 * done / total) : 0;
  document.getElementById("progFill").style.width = pct + "%";
  const label = state.topic === "ALL" ? "all topics" : state.topic;
  document.getElementById("progMeta").textContent =
    `Reviewed ${done} / ${total} in ${label}`;
}

/* ===================================================================== */
/*  TOOLBAR TOGGLES                                                       */
/* ===================================================================== */
function toggleShuffle(){
  state.shuffle = !state.shuffle;
  if (state.shuffle) state.order = {};            // fresh shuffle each enable
  document.getElementById("shuffleBtn").classList.toggle("on", state.shuffle);
  render();
}
function toggleStarFilter(){
  state.starFilter = !state.starFilter;
  document.getElementById("starFilterBtn").classList.toggle("on", state.starFilter);
  render();
}
function toggleHideReviewed(){
  state.hideReviewed = !state.hideReviewed;
  document.getElementById("hideReviewedBtn").classList.toggle("on", state.hideReviewed);
  render();
}
function resetAll(){
  if (!confirm("Clear all progress and stars for a fresh run?")) return;
  state.reviewed.clear();
  state.starred.clear();
  state.starFilter = false;
  state.hideReviewed = false;
  state.shuffle = false;
  state.order = {};
  ["shuffleBtn","starFilterBtn","hideReviewedBtn"].forEach(id=>
    document.getElementById(id).classList.remove("on"));
  render();
}

/* ===================================================================== */
/*  BOOT                                                                  */
/* ===================================================================== */
buildSidebar();
highlightSidebar();
render();
</script>
</body>
</html>
