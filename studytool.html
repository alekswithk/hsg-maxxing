<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4,222 Intro to Programming — Study Tool</title>
<style>
  :root {
    --hsg-red: #C8102E;
    --hsg-red-dark: #a00d24;
    --hsg-red-light: #f9e6e9;
    --bg: #f5f5f5;
    --card-bg: #ffffff;
    --text: #1a1a1a;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --correct: #16a34a;
    --correct-bg: #f0fdf4;
    --wrong: #dc2626;
    --wrong-bg: #fef2f2;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --radius: 12px;
    --code-bg: #1e1e2e;
    --code-text: #cdd6f4;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }
  /* ── Header ─────────────────────────────────────── */
  header {
    background: var(--hsg-red);
    color: #fff;
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  header .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.3px; }
  header .subtitle { font-size: 0.8rem; opacity: 0.85; }
  header nav { margin-left: auto; display: flex; gap: 0.5rem; }
  header nav button {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: none;
    padding: 0.35rem 0.9rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: background 0.15s;
  }
  header nav button:hover { background: rgba(255,255,255,0.28); }
  header nav button.active { background: rgba(255,255,255,0.35); }

  /* ── Layout ──────────────────────────────────────── */
  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  /* ── Views ───────────────────────────────────────── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── Dashboard ───────────────────────────────────── */
  .dash-header { margin-bottom: 1.5rem; }
  .dash-header h1 { font-size: 1.5rem; font-weight: 700; }
  .dash-header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .stat-card .num { font-size: 2rem; font-weight: 700; color: var(--hsg-red); }
  .stat-card .lbl { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.1rem; }

  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }
  .topic-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 1.25rem;
    box-shadow: var(--shadow);
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.12s, box-shadow 0.12s;
    position: relative;
    overflow: hidden;
  }
  .topic-card:hover {
    border-color: var(--hsg-red);
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
  }
  .topic-card .topic-icon { font-size: 1.75rem; margin-bottom: 0.5rem; }
  .topic-card .topic-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.2rem; }
  .topic-card .topic-meta { font-size: 0.78rem; color: var(--text-muted); }
  .topic-card .topic-progress {
    margin-top: 0.75rem;
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .topic-card .topic-progress-bar {
    height: 100%;
    background: var(--hsg-red);
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .topic-card .topic-score {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.35rem;
  }
  .topic-card.all-topics { border-style: dashed; border-color: var(--border); }
  .topic-card.all-topics:hover { border-color: var(--hsg-red); border-style: solid; }

  /* ── Quiz ────────────────────────────────────────── */
  .quiz-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .quiz-header button {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--text-muted);
    transition: border-color 0.15s, color 0.15s;
  }
  .quiz-header button:hover { border-color: var(--hsg-red); color: var(--hsg-red); }
  .quiz-header .quiz-title { font-weight: 600; font-size: 1rem; }
  .quiz-header .quiz-progress { margin-left: auto; font-size: 0.85rem; color: var(--text-muted); }

  .progress-bar-container {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--hsg-red);
    border-radius: 99px;
    transition: width 0.3s ease;
  }

  .question-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 1.75rem;
    box-shadow: var(--shadow);
    margin-bottom: 1.25rem;
  }
  .question-tag {
    display: inline-block;
    background: var(--hsg-red-light);
    color: var(--hsg-red);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 0.2rem 0.6rem;
    border-radius: 99px;
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .question-text {
    font-size: 1.05rem;
    font-weight: 500;
    line-height: 1.55;
    margin-bottom: 1.25rem;
  }
  .question-text code {
    background: var(--code-bg);
    color: var(--code-text);
    padding: 0.12em 0.4em;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 0.9em;
  }
  .code-block {
    background: var(--code-bg);
    color: var(--code-text);
    padding: 1rem 1.25rem;
    border-radius: 8px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 0.85rem;
    line-height: 1.6;
    margin-bottom: 1.25rem;
    overflow-x: auto;
    white-space: pre;
  }

  .options { display: grid; gap: 0.6rem; }
  .option-btn {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    text-align: left;
    cursor: pointer;
    font-size: 0.92rem;
    line-height: 1.45;
    transition: border-color 0.12s, background 0.12s;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
  }
  .option-btn .opt-letter {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-muted);
    transition: background 0.12s, color 0.12s;
    margin-top: 1px;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--hsg-red);
    background: var(--hsg-red-light);
  }
  .option-btn:hover:not(:disabled) .opt-letter { background: var(--hsg-red); color: #fff; }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .option-btn.correct .opt-letter { background: var(--correct); color: #fff; }
  .option-btn.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
  }
  .option-btn.wrong .opt-letter { background: var(--wrong); color: #fff; }
  .option-btn code {
    background: rgba(0,0,0,0.08);
    padding: 0.1em 0.35em;
    border-radius: 3px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.88em;
  }

  .explanation-box {
    display: none;
    margin-top: 1rem;
    padding: 1rem 1.25rem;
    border-radius: 10px;
    background: #f8fafc;
    border-left: 4px solid var(--hsg-red);
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.55;
  }
  .explanation-box.show { display: block; }
  .explanation-box code {
    background: var(--code-bg);
    color: var(--code-text);
    padding: 0.12em 0.4em;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.88em;
  }
  .explanation-label { font-weight: 600; color: var(--hsg-red); margin-bottom: 0.3rem; font-size: 0.8rem; text-transform: uppercase; }

  .quiz-actions { display: flex; justify-content: flex-end; margin-top: 1rem; }
  .btn-next {
    background: var(--hsg-red);
    color: #fff;
    border: none;
    padding: 0.65rem 1.5rem;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    display: none;
  }
  .btn-next:hover { background: var(--hsg-red-dark); }
  .btn-next.show { display: block; }

  /* ── Results ─────────────────────────────────────── */
  .results-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    box-shadow: var(--shadow);
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .results-emoji { font-size: 3rem; margin-bottom: 0.75rem; }
  .results-score { font-size: 3rem; font-weight: 800; color: var(--hsg-red); }
  .results-label { font-size: 1rem; color: var(--text-muted); margin-top: 0.25rem; }
  .results-breakdown { margin-top: 1.5rem; display: flex; justify-content: center; gap: 2rem; }
  .rb-item { text-align: center; }
  .rb-item .num { font-size: 1.5rem; font-weight: 700; }
  .rb-item .lbl { font-size: 0.78rem; color: var(--text-muted); }
  .rb-correct .num { color: var(--correct); }
  .rb-wrong .num { color: var(--wrong); }
  .results-actions { display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
  .btn-primary {
    background: var(--hsg-red);
    color: #fff;
    border: none;
    padding: 0.7rem 1.5rem;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--hsg-red-dark); }
  .btn-secondary {
    background: var(--card-bg);
    color: var(--text);
    border: 2px solid var(--border);
    padding: 0.7rem 1.5rem;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn-secondary:hover { border-color: var(--hsg-red); }

  .review-list { display: grid; gap: 0.75rem; }
  .review-item {
    background: var(--card-bg);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    box-shadow: var(--shadow);
    border-left: 4px solid;
    font-size: 0.88rem;
  }
  .review-item.correct { border-color: var(--correct); }
  .review-item.wrong { border-color: var(--wrong); }
  .review-item .ri-q { font-weight: 500; margin-bottom: 0.35rem; }
  .review-item .ri-a { color: var(--text-muted); }
  .review-item .ri-correct { color: var(--correct); font-weight: 600; }
  .review-item .ri-wrong { color: var(--wrong); font-weight: 600; }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(3, 1fr); }
    .stat-card .num { font-size: 1.5rem; }
    .results-breakdown { gap: 1.25rem; }
    header { gap: 0.5rem; }
    header .subtitle { display: none; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">4,222 ITP</div>
    <div class="subtitle">Introduction to Programming</div>
  </div>
  <nav>
    <button onclick="showDash()" id="nav-dash" class="active">Dashboard</button>
    <button onclick="startQuiz('all')" id="nav-all">All Topics</button>
  </nav>
</header>

<main>

  <!-- DASHBOARD -->
  <div class="view active" id="view-dash">
    <div class="dash-header">
      <h1>Study Dashboard</h1>
      <p>Select a topic to practice, or start a mixed quiz across all topics.</p>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="num" id="stat-answered">0</div>
        <div class="lbl">Questions Answered</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-correct">0</div>
        <div class="lbl">Correct</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-pct">—</div>
        <div class="lbl">Accuracy</div>
      </div>
    </div>
    <div class="topic-grid" id="topic-grid"></div>
  </div>

  <!-- QUIZ -->
  <div class="view" id="view-quiz">
    <div class="quiz-header">
      <button onclick="showDash()">← Back</button>
      <span class="quiz-title" id="quiz-title"></span>
      <span class="quiz-progress" id="quiz-progress"></span>
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar" id="quiz-bar"></div>
    </div>
    <div class="question-card">
      <div class="question-tag" id="q-tag"></div>
      <div class="question-text" id="q-text"></div>
      <div class="code-block" id="q-code" style="display:none"></div>
      <div class="options" id="q-options"></div>
      <div class="explanation-box" id="q-explanation">
        <div class="explanation-label">Explanation</div>
        <div id="q-explanation-text"></div>
      </div>
    </div>
    <div class="quiz-actions">
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next Question →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="view" id="view-results">
    <div class="results-card">
      <div class="results-emoji" id="res-emoji"></div>
      <div class="results-score" id="res-score"></div>
      <div class="results-label" id="res-label"></div>
      <div class="results-breakdown">
        <div class="rb-item rb-correct">
          <div class="num" id="res-correct"></div>
          <div class="lbl">Correct</div>
        </div>
        <div class="rb-item rb-wrong">
          <div class="num" id="res-wrong"></div>
          <div class="lbl">Incorrect</div>
        </div>
        <div class="rb-item">
          <div class="num" id="res-total"></div>
          <div class="lbl">Total</div>
        </div>
      </div>
      <div class="results-actions">
        <button class="btn-primary" id="btn-retry" onclick="retryQuiz()">Retry This Set</button>
        <button class="btn-secondary" onclick="showDash()">Back to Dashboard</button>
      </div>
    </div>
    <div id="review-section">
      <h3 style="margin-bottom:1rem; font-size:0.95rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px;">Review</h3>
      <div class="review-list" id="review-list"></div>
    </div>
  </div>

</main>

<script>
// ═══════════════════════════════════════════════════════
// QUESTION BANK
// ═══════════════════════════════════════════════════════
const TOPICS = [
  { id: 'terminal',  name: 'Terminal & Environment', icon: '💻', lectures: 'Weeks 1–2' },
  { id: 'git',       name: 'Git Basics',              icon: '🌿', lectures: 'Weeks 2–3' },
  { id: 'github',    name: 'Git Collaboration',       icon: '🤝', lectures: 'Week 3' },
  { id: 'python',    name: 'Python Basics',            icon: '🐍', lectures: 'Week 4' },
  { id: 'pandas',    name: 'Pandas & Visualization',  icon: '📊', lectures: 'Weeks 5–6' },
  { id: 'oop',       name: 'Object-Oriented Programming', icon: '🧱', lectures: 'Week 7' },
  { id: 'sql',       name: 'Databases & SQL',          icon: '🗄️', lectures: 'Weeks 9–10' },
];

const Q = [
  // ═══ TERMINAL & ENVIRONMENT ═══════════════════════════
  {
    topic: 'terminal',
    q: 'Which command shows your current working directory in bash/macOS?',
    opts: ['<code>ls</code>', '<code>pwd</code>', '<code>cd</code>', '<code>dir</code>'],
    a: 1,
    exp: '<code>pwd</code> stands for <em>print working directory</em>. On Windows (cmd), <code>cd</code> without arguments shows the current directory. <code>dir</code> lists files. <code>ls</code> also lists files.'
  },
  {
    topic: 'terminal',
    q: 'What does the path shortcut <code>..</code> refer to?',
    opts: ['The current directory', 'The root directory', 'The parent directory', 'The home directory'],
    a: 2,
    exp: '<code>..</code> refers to the parent directory (one level up). <code>.</code> is the current directory, <code>~</code> is the home directory.'
  },
  {
    topic: 'terminal',
    q: 'What is the difference between an absolute path and a relative path?',
    opts: [
      'Absolute paths use forward slashes, relative paths use backslashes',
      'Absolute paths start from the root of the file system; relative paths start from the current directory',
      'Absolute paths are shorter; relative paths are longer',
      'There is no meaningful difference'
    ],
    a: 1,
    exp: 'An absolute path starts from the root (e.g. <code>C:/Users/Bilbo/doc.txt</code>). A relative path starts from wherever your shell currently is (e.g. <code>../doc.txt</code>).'
  },
  {
    topic: 'terminal',
    q: 'Which naming convention is recommended for Python files and variables?',
    opts: ['camelCase', 'PascalCase', 'kebab-case', 'snake_case'],
    a: 3,
    exp: 'Python convention (PEP 8) uses <code>snake_case</code> for files, variables, and functions (e.g. <code>my_file.py</code>). PascalCase is used for class names.'
  },
  {
    topic: 'terminal',
    q: 'What is a shell?',
    opts: [
      'A graphical application for editing code',
      'The program that interprets your terminal commands (e.g. bash, zsh)',
      'A Python environment manager',
      'The hard drive partition that stores the OS'
    ],
    a: 1,
    exp: 'The <em>terminal</em> is the window where you type. The <em>shell</em> (e.g. bash, zsh, PowerShell) is the program running inside it that interprets your commands.'
  },
  {
    topic: 'terminal',
    q: 'What does <code>uv init my_project</code> do?',
    opts: [
      'Installs the uv package manager globally',
      'Creates a new Python project with its own virtual environment',
      'Updates all packages in the current environment',
      'Links the project to a GitHub repository'
    ],
    a: 1,
    exp: '<code>uv init my_project</code> creates a new project directory with the key files: <code>.python-version</code>, <code>pyproject.toml</code>, and sets up a <code>.venv/</code> folder.'
  },
  {
    topic: 'terminal',
    q: 'Which three files are created/managed by <code>uv</code> to define a Python project\'s environment?',
    opts: [
      '<code>requirements.txt</code>, <code>setup.py</code>, <code>venv.cfg</code>',
      '<code>.python-version</code>, <code>pyproject.toml</code>, <code>uv.lock</code>',
      '<code>Pipfile</code>, <code>Pipfile.lock</code>, <code>.env</code>',
      '<code>conda.yaml</code>, <code>environment.yml</code>, <code>setup.cfg</code>'
    ],
    a: 1,
    exp: 'uv uses <code>.python-version</code> (Python version), <code>pyproject.toml</code> (dependencies), and <code>uv.lock</code> (exact locked versions). The <code>.venv/</code> folder is the realized environment — never commit it.'
  },
  {
    topic: 'terminal',
    q: 'Why should you use virtual environments instead of installing Python packages globally?',
    opts: [
      'Global installs are slower than virtual environments',
      'Different projects may need different (possibly conflicting) package versions',
      'Virtual environments reduce file size on disk',
      'Global installs require administrator permissions'
    ],
    a: 1,
    exp: 'If Project A needs pandas 1.5 and Project B needs pandas 2.0, a global install of one version breaks the other. Virtual environments isolate each project\'s dependencies.'
  },
  {
    topic: 'terminal',
    q: 'What does <code>uv run main.py</code> do differently from <code>python main.py</code>?',
    opts: [
      'It runs the script faster using compiled code',
      'It automatically uses the project\'s virtual environment',
      'It lints the code before running',
      'It runs the script in debug mode'
    ],
    a: 1,
    exp: '<code>uv run</code> automatically activates the project\'s virtual environment before executing the script, ensuring the correct Python version and packages are used.'
  },
  {
    topic: 'terminal',
    q: 'What command creates a new directory called <code>data</code>?',
    opts: ['<code>touch data</code>', '<code>mkdir data</code>', '<code>new data</code>', '<code>create data</code>'],
    a: 1,
    exp: '<code>mkdir</code> (make directory) works the same on bash/macOS and Windows cmd. <code>touch</code> creates an empty file on macOS/Linux.'
  },
  {
    topic: 'terminal',
    q: 'Which keyboard shortcut auto-completes file and directory names in the terminal?',
    opts: ['Ctrl+Enter', 'Tab', 'Ctrl+Space', 'Shift+Tab'],
    a: 1,
    exp: 'Pressing <code>Tab</code> auto-completes file and directory names. If there are multiple matches, press Tab twice to see them all.'
  },
  {
    topic: 'terminal',
    q: 'What is the home directory shortcut in bash?',
    opts: ['<code>/</code>', '<code>.</code>', '<code>~</code>', '<code>@</code>'],
    a: 2,
    exp: '<code>~</code> is a shortcut for the home directory (e.g. <code>/Users/username</code> on macOS). Running <code>cd</code> without arguments also takes you to <code>~</code>.'
  },
  {
    topic: 'terminal',
    q: 'What is an IDE (Integrated Development Environment)?',
    opts: [
      'A tool for writing, running, and managing code with features like syntax highlighting, error detection, and debugging',
      'A type of Python virtual environment',
      'A version control system like Git',
      'A command-line package manager'

// STATE & STORAGE
// ═══════════════════════════════════════════════════════
const STORAGE_KEY = 'itp_studytool_v3';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

let state = loadState();
// state structure: { topicId: { answered: N, correct: N } }

function getTopicStats(topicId) {
  return state[topicId] || { answered: 0, correct: 0 };
}
function recordAnswer(topicId, wasCorrect) {
  if (!state[topicId]) state[topicId] = { answered: 0, correct: 0 };
  state[topicId].answered++;
  if (wasCorrect) state[topicId].correct++;
  saveState(state);
}

// QUIZ ENGINE
// ═══════════════════════════════════════════════════════
let currentQuiz = { topicId: null, questions: [], idx: 0, answers: [] };

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(topicId) {
  const pool = topicId === 'all' ? Q : Q.filter(q => q.topic === topicId);
  const questions = shuffle(pool).slice(0, topicId === 'all' ? 20 : Math.min(pool.length, 15));
  currentQuiz = { topicId, questions, idx: 0, answers: [] };

  const topicObj = TOPICS.find(t => t.id === topicId);
  document.getElementById('quiz-title').textContent = topicId === 'all'
    ? 'All Topics — Mixed Quiz' : topicObj.name;

  showView('quiz');
  renderQuestion();
  updateNav('');
}

function renderQuestion() {
  const { questions, idx } = currentQuiz;
  const q = questions[idx];
  const total = questions.length;

  document.getElementById('quiz-progress').textContent = `${idx + 1} / ${total}`;
  document.getElementById('quiz-bar').style.width = `${(idx / total) * 100}%`;

  const topic = TOPICS.find(t => t.id === q.topic);
  document.getElementById('q-tag').textContent = topic ? topic.name : q.topic;

  // question text — handle HTML in options but plain text in question
  document.getElementById('q-text').innerHTML = q.q;

  const codeEl = document.getElementById('q-code');
  if (q.code) {
    codeEl.textContent = q.code;
    codeEl.style.display = 'block';
  } else {
    codeEl.style.display = 'none';
  }

  const optContainer = document.getElementById('q-options');
  optContainer.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    optContainer.appendChild(btn);
  });

  document.getElementById('q-explanation').classList.remove('show');
  document.getElementById('btn-next').classList.remove('show');
}

function selectAnswer(selectedIdx) {
  const { questions, idx } = currentQuiz;
  const q = questions[idx];
  const correct = q.a;
  const wasCorrect = selectedIdx === correct;

  currentQuiz.answers.push({ q, selected: selectedIdx, correct, wasCorrect });
  recordAnswer(q.topic, wasCorrect);

  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct');
    if (i === selectedIdx && !wasCorrect) btn.classList.add('wrong');
  });

  document.getElementById('q-explanation-text').innerHTML = q.exp;
  document.getElementById('q-explanation').classList.add('show');

  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = idx + 1 < questions.length ? 'Next Question →' : 'See Results';
  nextBtn.classList.add('show');

  updateDashStats();
}

function nextQuestion() {
  currentQuiz.idx++;
  if (currentQuiz.idx < currentQuiz.questions.length) {
    renderQuestion();
  } else {
    showResults();
  }
}

function retryQuiz() {
  startQuiz(currentQuiz.topicId);
}

// ═══════════════════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════════════════
function showResults() {
  const answers = currentQuiz.answers;
  const total = answers.length;
  const correct = answers.filter(a => a.wasCorrect).length;
  const wrong = total - correct;
  const pct = Math.round((correct / total) * 100);

  const emojis = pct >= 90 ? '🏆' : pct >= 75 ? '🎉' : pct >= 60 ? '📚' : '💪';
  document.getElementById('res-emoji').textContent = emojis;
  document.getElementById('res-score').textContent = `${pct}%`;
  document.getElementById('res-label').textContent = `${correct} of ${total} correct`;
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-total').textContent = total;

  const reviewList = document.getElementById('review-list');
  reviewList.innerHTML = '';
  answers.forEach((a, i) => {
    const item = document.createElement('div');
    item.className = `review-item ${a.wasCorrect ? 'correct' : 'wrong'}`;
    const topicObj = TOPICS.find(t => t.id === a.q.topic);
    item.innerHTML = `
      <div class="ri-q">${i + 1}. ${a.q.q.replace(/<code>/g,'`').replace(/<\/code>/g,'`').replace(/<[^>]+>/g,'')}</div>
      <div class="ri-a">
        Your answer: <span class="${a.wasCorrect ? 'ri-correct' : 'ri-wrong'}">${a.q.opts[a.selected].replace(/<[^>]+>/g,'')}</span>
        ${!a.wasCorrect ? ` &nbsp;·&nbsp; Correct: <span class="ri-correct">${a.q.opts[a.correct].replace(/<[^>]+>/g,'')}</span>` : ''}
      </div>
    `;
    reviewList.appendChild(item);
  });

  showView('results');
  updateNav('');
}

// ═══════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════
function buildDashboard() {
  const grid = document.getElementById('topic-grid');
  grid.innerHTML = '';

  TOPICS.forEach(topic => {
    const stats = getTopicStats(topic.id);
    const pct = stats.answered > 0 ? Math.round((stats.correct / stats.answered) * 100) : 0;
    const topicQCount = Q.filter(q => q.topic === topic.id).length;

    const card = document.createElement('div');
    card.className = 'topic-card';
    card.onclick = () => startQuiz(topic.id);
    card.innerHTML = `
      <div class="topic-icon">${topic.icon}</div>
      <div class="topic-name">${topic.name}</div>
      <div class="topic-meta">${topic.lectures} · ${topicQCount} questions</div>
      <div class="topic-progress">
        <div class="topic-progress-bar" style="width:${stats.answered > 0 ? pct : 0}%"></div>
      </div>
      <div class="topic-score">${stats.answered > 0 ? `${pct}% accuracy (${stats.answered} answered)` : 'Not started yet'}</div>
    `;
    grid.appendChild(card);
  });

  // All topics card
  const allCard = document.createElement('div');
  allCard.className = 'topic-card all-topics';
  allCard.onclick = () => startQuiz('all');
  allCard.innerHTML = `
    <div class="topic-icon">🎲</div>
    <div class="topic-name">All Topics — Mixed Quiz</div>
    <div class="topic-meta">20 random questions · all lectures</div>
    <div class="topic-progress"><div class="topic-progress-bar" style="width:0"></div></div>
    <div class="topic-score">Start a mixed practice session</div>
  `;
  grid.appendChild(allCard);

  updateDashStats();
}

function updateDashStats() {
  let totalAnswered = 0, totalCorrect = 0;
  TOPICS.forEach(t => {
    const s = getTopicStats(t.id);
    totalAnswered += s.answered;
    totalCorrect += s.correct;
  });
  document.getElementById('stat-answered').textContent = totalAnswered;
  document.getElementById('stat-correct').textContent = totalCorrect;
  document.getElementById('stat-pct').textContent = totalAnswered > 0
    ? `${Math.round((totalCorrect / totalAnswered) * 100)}%` : '—';
}

// ═══════════════════════════════════════════════════════
// VIEW MANAGEMENT
// ═══════════════════════════════════════════════════════
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
}

function showDash() {
  showView('dash');
  buildDashboard();
  updateNav('dash');
}

function updateNav(active) {
  document.getElementById('nav-dash').classList.toggle('active', active === 'dash');
  document.getElementById('nav-all').classList.toggle('active', false);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
showDash();
</script>
